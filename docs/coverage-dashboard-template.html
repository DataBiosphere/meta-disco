<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AnVIL Classification Coverage</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background: #fff; color: #24292f; }
    h1 { border-bottom: 1px solid #d0d7de; padding-bottom: 8px; }
    h2 { margin-top: 40px; border-bottom: 1px solid #d0d7de; padding-bottom: 6px; }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin: 20px 0; }
    .summary-card { border: 1px solid #d0d7de; border-radius: 6px; padding: 16px; text-align: center; }
    .summary-card .label { font-size: 14px; color: #656d76; }
    .summary-card .value { font-size: 28px; font-weight: 600; }
    .summary-card .pct { font-size: 14px; color: #656d76; }
    .chart-container { margin: 20px 0; }
    .bar-chart { width: 100%; }
    .bar-row { display: flex; align-items: center; margin: 4px 0; position: relative; }
    .bar-label { width: 220px; font-size: 13px; text-align: right; padding-right: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; height: 24px; background: #f6f8fa; border-radius: 3px; overflow: hidden; position: relative; cursor: pointer; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .bar-value { position: absolute; right: 6px; top: 3px; font-size: 12px; color: #24292f; }
    .tooltip { display: none; position: absolute; left: 230px; top: 28px; z-index: 10; background: #24292f; color: #fff; padding: 8px 12px; border-radius: 6px; font-size: 12px; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .tooltip table { border-collapse: collapse; }
    .tooltip td { padding: 1px 8px 1px 0; }
    .tooltip td:last-child { text-align: right; }
    .bar-row:hover .tooltip { display: block; }
    .nc-table { border-collapse: collapse; width: 100%; margin: 10px 0; }
    .nc-table th, .nc-table td { border: 1px solid #d0d7de; padding: 6px 10px; text-align: left; font-size: 13px; }
    .nc-table th { background: #f6f8fa; }
    .nc-table td:nth-child(2) { text-align: right; }
    .tab-bar { display: flex; gap: 0; border-bottom: 1px solid #d0d7de; margin-bottom: 20px; }
    .tab { padding: 8px 16px; cursor: pointer; border: 1px solid transparent; border-bottom: none; margin-bottom: -1px; font-size: 14px; color: #656d76; }
    .tab.active { color: #24292f; background: #fff; border-color: #d0d7de; border-radius: 6px 6px 0 0; font-weight: 600; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .donut-container { display: flex; align-items: center; gap: 40px; margin: 20px 0; }
    .donut-legend { font-size: 13px; }
    .donut-legend div { margin: 4px 0; display: flex; align-items: center; gap: 6px; }
    .legend-swatch { width: 12px; height: 12px; border-radius: 2px; display: inline-block; }
  </style>
</head>
<body>
  <nav style="font-size: 14px; margin-bottom: 12px; color: #656d76;">
    <strong style="color: #24292f;">Coverage Report</strong>
    &middot;
    <a href="validation-dashboard.html" style="color: #0969da; text-decoration: none;">Validation Report</a>
  </nav>
  <h1>AnVIL Classification Coverage Dashboard <span id="run-time" style="font-size: 16px; font-weight: normal; color: #656d76;"></span></h1>
  <p id="subtitle"></p>

  <div class="summary-grid" id="summary-cards"></div>

  <div class="tab-bar" id="tab-bar"></div>
  <div id="tab-contents"></div>

  <script type="module">
    // Data injected by generate script
    const DATA = COVERAGE_DATA_PLACEHOLDER;

    document.getElementById('run-time').textContent = DATA.run_time;

    const anvilUrl = 'https://explore.anvilproject.org/datasets?filter=%5B%7B%22categoryKey%22%3A%22accessible%22%2C%22value%22%3A%5B%22true%22%5D%7D%5D';
    const datasets = DATA.datasets || [];
    const totalFiles = datasets.reduce((s, d) => s + d.count, 0);
    const subtitleEl = document.getElementById('subtitle');

    if (datasets.length > 0) {
      let html = `${DATA.total.toLocaleString()} files from ${datasets.length} open-access datasets on the <a href="${anvilUrl}">AnVIL Explorer</a>: `;
      html += datasets.map(d => `${d.name} (${d.count.toLocaleString()})`).join(', ');
      subtitleEl.innerHTML = html;
    } else {
      subtitleEl.textContent = `Coverage of ${DATA.total.toLocaleString()} classified file records across ${DATA.dimensions.length} dimensions.`;
    }

    // Colors
    const COLORS = [
      '#2da44e', '#0969da', '#8250df', '#bf8700', '#cf222e',
      '#1a7f37', '#0550ae', '#6639ba', '#9a6700', '#a40e26',
      '#218bff', '#a475f9', '#d4a72c', '#ff8c00', '#6e7781',
    ];
    const NC_COLOR = '#d0d7de';

    // Summary cards
    const cardsEl = document.getElementById('summary-cards');
    for (const dim of DATA.dimensions) {
      const card = document.createElement('div');
      card.className = 'summary-card';
      card.innerHTML = `
        <div class="label">${dim.label}</div>
        <div class="value" style="color: ${dim.classified / DATA.total > 0.5 ? '#2da44e' : '#cf222e'}">${(100 * dim.classified / DATA.total).toFixed(1)}%</div>
        <div class="pct">${dim.classified.toLocaleString()} / ${DATA.total.toLocaleString()}</div>
      `;
      cardsEl.appendChild(card);
    }

    // Tabs
    const tabBar = document.getElementById('tab-bar');
    const tabContents = document.getElementById('tab-contents');

    DATA.dimensions.forEach((dim, i) => {
      // Tab button
      const tab = document.createElement('div');
      tab.className = 'tab' + (i === 0 ? ' active' : '');
      tab.textContent = dim.label;
      tab.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + i).classList.add('active');
      };
      tabBar.appendChild(tab);

      // Tab content
      const content = document.createElement('div');
      content.id = 'tab-' + i;
      content.className = 'tab-content' + (i === 0 ? ' active' : '');

      // Summary
      const naCount = (dim.values.find(v => v.name === 'not_applicable') || {count: 0}).count;
      let html = `<h2>Inferred ${dim.label} Summary</h2>`;
      html += `
        <table class="nc-table" style="width: auto; margin-bottom: 12px;">
          <tr><td><strong>Files classified</strong></td><td>${dim.classified.toLocaleString()}</td><td>${(100 * dim.classified / DATA.total).toFixed(1)}%</td></tr>
          <tr><td><strong>Not classified</strong></td><td>${dim.not_classified.toLocaleString()}</td><td>${(100 * dim.not_classified / DATA.total).toFixed(1)}%</td></tr>
        </table>
      `;
      html += `<p style="font-size: 14px; color: #656d76; margin-bottom: 20px;">Of the ${DATA.total.toLocaleString()} files, we were able to assign a ${dim.label} to ${dim.classified.toLocaleString()} files, including ${naCount.toLocaleString()} files assigned "not_applicable". There were ${dim.not_classified.toLocaleString()} files we were not able to determine a ${dim.label} for.</p>`;

      // Horizontal bar chart
      const maxCount = Math.max(...dim.values.map(v => v.count));
      html += `<h2>Inferred ${dim.label}</h2>`;
      html += '<div class="chart-container"><div class="bar-chart">';
      dim.values.forEach((v, vi) => {
        const width = (v.count / maxCount * 100).toFixed(1);
        const color = v.name === 'not_classified' || v.name === 'None' ? NC_COLOR : COLORS[vi % COLORS.length];
        const extRows = (v.extensions || [])
          .map(e => `<tr><td>${e.ext}</td><td>${e.count.toLocaleString()}</td></tr>`)
          .join('');
        html += `
          <div class="bar-row">
            <div class="bar-label" title="${v.name}">${v.name}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width: ${width}%; background: ${color};"></div>
              <div class="bar-value">${v.count.toLocaleString()} (${(100 * v.count / DATA.total).toFixed(1)}%)</div>
            </div>
            <div class="tooltip"><table>${extRows}</table></div>
          </div>
        `;
      });
      html += '</div></div>';

      // Not classified breakdown
      if (dim.not_classified_breakdown && dim.not_classified_breakdown.length > 0) {
        html += '<h3>What\'s not classified?</h3>';
        html += `<p style="font-size: 14px; color: #656d76; margin-bottom: 12px;">We were not able to determine a ${dim.label} (or if ${dim.label} is applicable) for the following file types:</p>`;
        html += '<table class="nc-table"><tr><th>Extension</th><th>Count</th><th>Root cause</th></tr>';
        for (const nc of dim.not_classified_breakdown) {
          html += `<tr><td>${nc.ext}</td><td>${nc.count.toLocaleString()}</td><td>${nc.why}</td></tr>`;
        }
        html += '</table>';
      }

      if (dim.notes) {
        html += `<p style="font-size: 13px; color: #656d76; margin-top: 16px;">${dim.notes}</p>`;
      }

      content.innerHTML = html;
      tabContents.appendChild(content);
    });
  </script>
</body>
</html>
