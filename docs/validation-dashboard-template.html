<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Validation Report Dashboard</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background: #fff; color: #24292f; }
    h1 { border-bottom: 1px solid #d0d7de; padding-bottom: 8px; }
    h2 { margin-top: 40px; border-bottom: 1px solid #d0d7de; padding-bottom: 6px; }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin: 20px 0; }
    .summary-card { border: 1px solid #d0d7de; border-radius: 6px; padding: 16px; text-align: center; }
    .summary-card .label { font-size: 14px; color: #656d76; }
    .summary-card .value { font-size: 28px; font-weight: 600; }
    .summary-card .pct { font-size: 14px; color: #656d76; }
    .chart-container { margin: 20px 0; }
    .bar-chart { width: 100%; }
    .bar-row { display: flex; align-items: center; margin: 6px 0; }
    .bar-label { width: 180px; font-size: 13px; text-align: right; padding-right: 10px; white-space: nowrap; }
    .bar-track { flex: 1; height: 24px; background: #f6f8fa; border-radius: 3px; overflow: hidden; display: flex; }
    .bar-segment { height: 100%; transition: width 0.3s; position: relative; }
    .bar-value { position: absolute; right: -60px; top: 3px; font-size: 12px; color: #24292f; white-space: nowrap; }
    .tab-bar { display: flex; gap: 0; border-bottom: 1px solid #d0d7de; margin-bottom: 20px; }
    .tab { padding: 8px 16px; cursor: pointer; border: 1px solid transparent; border-bottom: none; margin-bottom: -1px; font-size: 14px; color: #656d76; }
    .tab.active { color: #24292f; background: #fff; border-color: #d0d7de; border-radius: 6px 6px 0 0; font-weight: 600; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .legend { display: flex; gap: 20px; margin: 16px 0; font-size: 13px; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch { width: 12px; height: 12px; border-radius: 2px; display: inline-block; }
    .disc-table { border-collapse: collapse; width: 100%; margin: 10px 0; }
    .disc-table th, .disc-table td { border: 1px solid #d0d7de; padding: 6px 10px; text-align: left; font-size: 13px; }
    .disc-table th { background: #f6f8fa; }
    .disc-table td:first-child { max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <nav style="font-size: 14px; margin-bottom: 12px; color: #656d76;">
    <a href="coverage-dashboard.html" style="color: #0969da; text-decoration: none;">Coverage</a>
    &middot;
    <strong style="color: #24292f;">Validation</strong>
  </nav>
  <h1>Validation Report Dashboard</h1>
  <p id="subtitle"></p>

  <div class="summary-grid" id="summary-cards"></div>

  <div class="legend">
    <div class="legend-item"><span class="legend-swatch" style="background: #2da44e;"></span> Agree</div>
    <div class="legend-item"><span class="legend-swatch" style="background: #cf222e;"></span> Discrepancy</div>
    <div class="legend-item"><span class="legend-swatch" style="background: #bf8700;"></span> No Ground Truth</div>
    <div class="legend-item"><span class="legend-swatch" style="background: #d0d7de;"></span> We Missed</div>
  </div>

  <div class="tab-bar" id="tab-bar"></div>
  <div id="tab-contents"></div>

  <script type="module">
    const DATA = VALIDATION_DATA_PLACEHOLDER;

    const escapeHtml = (value) => {
      const div = document.createElement('div');
      div.textContent = value == null ? '' : String(value);
      return div.innerHTML;
    };

    const COLORS = {
      agree: '#2da44e',
      discrepancy: '#cf222e',
      we_inferred: '#bf8700',
      not_classified: '#d0d7de',
    };

    const DIM_LABELS = {
      data_modality: 'Data Modality',
      data_type: 'Data Type',
      platform: 'Platform',
      reference_assembly: 'Reference Assembly',
      assay_type: 'Assay Type',
    };

    document.getElementById('subtitle').textContent =
      `Comparing meta-disco rule engine classifications against external ground truth. Run: ${DATA.run_time}`;

    // Summary cards — one per source
    const cardsEl = document.getElementById('summary-cards');
    for (const [sourceName, results] of Object.entries(DATA.sources)) {
      const dims = results.dimensions || {};
      const totalAgree = Object.values(dims).reduce((s, d) => s + (d.agree || 0), 0);
      const totalDisc = Object.values(dims).reduce((s, d) => s + (d.discrepancy || 0), 0);
      const totalCompared = totalAgree + totalDisc;
      const agreePct = totalCompared > 0 ? (100 * totalAgree / totalCompared).toFixed(1) : 'N/A';

      const card = document.createElement('div');
      card.className = 'summary-card';
      card.innerHTML = `
        <div class="label">${sourceName}</div>
        <div class="value" style="color: ${totalDisc === 0 ? '#2da44e' : '#cf222e'}">${agreePct}%</div>
        <div class="pct">${results.matched.toLocaleString()} files matched, ${totalDisc} discrepancies</div>
      `;
      cardsEl.appendChild(card);
    }

    // Tabs — one per source
    const tabBar = document.getElementById('tab-bar');
    const tabContents = document.getElementById('tab-contents');
    const sourceEntries = Object.entries(DATA.sources);
    const EMPTY = {agree:0, discrepancy:0, we_inferred:0, not_classified:0, no_truth:0, discrepancy_categories:{}};
    const ALL_DIMS = ['data_modality','data_type','platform','reference_assembly','assay_type'];

    sourceEntries.forEach(([sourceName, results], i) => {
      const tab = document.createElement('div');
      tab.className = 'tab' + (i === 0 ? ' active' : '');
      tab.textContent = sourceName;
      tab.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('source-tab-' + i).classList.add('active');
      };
      tabBar.appendChild(tab);

      const content = document.createElement('div');
      content.id = 'source-tab-' + i;
      content.className = 'tab-content' + (i === 0 ? ' active' : '');

      const sourceLabel = sourceName.includes('(') ? sourceName.split('(')[0].trim() : sourceName;
      const sourceDesc = (DATA.source_descriptions || {})[sourceName] || '';
      let html = '';
      if (sourceDesc) {
        html += `<p>${sourceDesc}</p>`;
      }
      html += `<p>Matched <strong>${results.matched.toLocaleString()}</strong> files (${results.unmatched.toLocaleString()} in source but not in our classifications).</p>`;

      const dims = results.dimensions || {};

      // Per-dimension sections
      for (const dim of ALL_DIMS) {
        const stats = dims[dim] || EMPTY;
        const label = DIM_LABELS[dim] || dim;
        const available = stats.agree + stats.discrepancy + stats.not_classified;
        const classified = stats.agree + stats.discrepancy + stats.we_inferred;
        const bothHave = stats.agree + stats.discrepancy;
        const accuracy = bothHave > 0 ? `${(100 * stats.agree / bothHave).toFixed(1)}%` : '-';

        html += `<h3>${label}</h3>`;
        html += `<ul style="font-size: 14px; line-height: 1.8;">
          <li><strong>${available.toLocaleString()}</strong> values available from source</li>
          <li><strong>${bothHave.toLocaleString()}</strong> also classified by rule engine</li>
          <li><strong>${stats.not_classified.toLocaleString()}</strong> not classified by rule engine (no rule applies)</li>
          <li><strong>${stats.agree.toLocaleString()}</strong> agreed</li>
          <li><strong>${stats.discrepancy.toLocaleString()}</strong> discrepancies</li>
          <li><strong>${accuracy}</strong> accuracy</li>
        </ul>`;

        // Stacked bar
        const total = available + stats.we_inferred;
        if (total > 0) {
          const segments = [
            { key: 'agree', count: stats.agree },
            { key: 'discrepancy', count: stats.discrepancy },
            { key: 'we_inferred', count: stats.we_inferred },
            { key: 'not_classified', count: stats.not_classified },
          ];
          html += '<div style="margin: 12px 0;"><div class="bar-row"><div class="bar-track">';
          for (const seg of segments) {
            if (seg.count > 0) {
              const w = (100 * seg.count / total).toFixed(1);
              html += `<div class="bar-segment" style="width: ${w}%; background: ${COLORS[seg.key]};" title="${seg.key}: ${seg.count.toLocaleString()}"></div>`;
            }
          }
          html += '</div></div></div>';
        }

        // Discrepancy categories
        const cats = stats.discrepancy_categories || {};
        const sortedCats = Object.values(cats).sort((a, b) => b.count - a.count);
        if (sortedCats.length > 0) {
          html += `<h4>Discrepancies</h4>`;
          html += `<table class="disc-table">
            <tr><th>Count</th><th>Inferred</th><th>${escapeHtml(sourceLabel)}</th><th>Example</th></tr>`;
          for (const cat of sortedCats) {
            html += `<tr>
              <td style="text-align: right;">${cat.count.toLocaleString()}</td>
              <td>${escapeHtml(cat.ours)}</td>
              <td>${escapeHtml(cat.truth_mapped)}</td>
              <td title="${escapeHtml(cat.example)}">${escapeHtml(cat.example)}</td>
            </tr>`;
          }
          html += '</table>';
        }
      }

      content.innerHTML = html;
      tabContents.appendChild(content);
    });
  </script>
</body>
</html>
