<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Validation Report Dashboard</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background: #fff; color: #24292f; }
    h1 { border-bottom: 1px solid #d0d7de; padding-bottom: 8px; }
    h2 { margin-top: 40px; border-bottom: 1px solid #d0d7de; padding-bottom: 6px; }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin: 20px 0; }
    .summary-card { border: 1px solid #d0d7de; border-radius: 6px; padding: 16px; text-align: center; }
    .summary-card .label { font-size: 14px; color: #656d76; }
    .summary-card .value { font-size: 28px; font-weight: 600; }
    .summary-card .pct { font-size: 14px; color: #656d76; }
    .chart-container { margin: 20px 0; }
    .bar-chart { width: 100%; }
    .bar-row { display: flex; align-items: center; margin: 6px 0; }
    .bar-label { width: 180px; font-size: 13px; text-align: right; padding-right: 10px; white-space: nowrap; }
    .bar-track { flex: 1; height: 24px; background: #f6f8fa; border-radius: 3px; overflow: hidden; display: flex; }
    .bar-segment { height: 100%; transition: width 0.3s; position: relative; }
    .bar-value { position: absolute; right: -60px; top: 3px; font-size: 12px; color: #24292f; white-space: nowrap; }
    .tab-bar { display: flex; gap: 0; border-bottom: 1px solid #d0d7de; margin-bottom: 20px; }
    .tab { padding: 8px 16px; cursor: pointer; border: 1px solid transparent; border-bottom: none; margin-bottom: -1px; font-size: 14px; color: #656d76; }
    .tab.active { color: #24292f; background: #fff; border-color: #d0d7de; border-radius: 6px 6px 0 0; font-weight: 600; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .legend { display: flex; gap: 20px; margin: 16px 0; font-size: 13px; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch { width: 12px; height: 12px; border-radius: 2px; display: inline-block; }
    .disc-table { border-collapse: collapse; width: 100%; margin: 10px 0; }
    .disc-table th, .disc-table td { border: 1px solid #d0d7de; padding: 6px 10px; text-align: left; font-size: 13px; }
    .disc-table th { background: #f6f8fa; }
    .disc-table td:first-child { max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <nav style="font-size: 14px; margin-bottom: 12px; color: #656d76;">
    <a href="coverage-dashboard.html" style="color: #0969da; text-decoration: none;">Coverage Report</a>
    &middot;
    <strong style="color: #24292f;">Validation Report</strong>
  </nav>
  <h1>Validation Report Dashboard <span id="run-time" style="font-size: 16px; font-weight: normal; color: #656d76;"></span></h1>
  <p id="subtitle"></p>

  <div class="summary-grid" id="summary-cards"></div>

  <div class="legend">
    <div class="legend-item"><span class="legend-swatch" style="background: #2da44e;"></span> Agree</div>
    <div class="legend-item"><span class="legend-swatch" style="background: #cf222e;"></span> Discrepancy</div>
    <div class="legend-item"><span class="legend-swatch" style="background: #bf8700;"></span> No Ground Truth</div>
    <div class="legend-item"><span class="legend-swatch" style="background: #d0d7de;"></span> We Missed</div>
  </div>

  <div class="tab-bar" id="tab-bar"></div>
  <div id="tab-contents"></div>

  <script type="module">
    const DATA = {"run_time": "2026-03-22 19:57:03", "sources": {"AnVIL (Azul metadata)": {"matched": 11231, "unmatched": 0, "dimensions": {"data_modality": {"agree": 349, "discrepancy": 4, "we_inferred": 650, "not_classified": 6402, "no_truth": 3826, "discrepancy_categories": {"transcriptomic.single_cell vs epigenomic.chromatin_accessibility": {"ours": "transcriptomic.single_cell", "truth_mapped": "epigenomic.chromatin_accessibility", "count": 2, "example": "f92b42c30ff64edb444dfece410630d2"}, "genomic vs epigenomic.chromatin_accessibility": {"ours": "genomic", "truth_mapped": "epigenomic.chromatin_accessibility", "count": 2, "example": "9a2afd8bc8423535f42201ba189540fb"}}}, "reference_assembly": {"agree": 634, "discrepancy": 0, "we_inferred": 0, "not_classified": 4062, "no_truth": 6535, "discrepancy_categories": {}}}, "total_source_files": 758658, "metadata_coverage": {"reference_assembly": 4696, "data_modality": 6755}, "datasets": [{"name": "ANVIL_T2T_CHRY", "count": 309979}, {"name": "ANVIL_T2T", "count": 289204}, {"name": "ANVIL_HPRC", "count": 67830}, {"name": "ANVIL_1000G_high_coverage_2019", "count": 26016}, {"name": "ANVIL_GTEx_public_data", "count": 25789}, {"name": "ANVIL_NIA_CARD_Coriell_Cell_Lines_Open", "count": 12534}, {"name": "ANVIL_1000G_PRIMED_data_model", "count": 11493}, {"name": "AnVIL_IGVF_Mouse_R1", "count": 6784}, {"name": "AnVIL_ENCORE_RS293", "count": 3752}, {"name": "AnVIL_MAGE", "count": 3285}, {"name": "AnVIL_ENCORE_293T", "count": 1992}]}, "HPRC (sequencing catalog)": {"matched": 6040, "unmatched": 0, "dimensions": {"platform": {"agree": 3660, "discrepancy": 0, "we_inferred": 0, "not_classified": 2380, "no_truth": 0, "discrepancy_categories": {}}, "data_modality": {"agree": 0, "discrepancy": 0, "we_inferred": 0, "not_classified": 5840, "no_truth": 0, "discrepancy_categories": {}}, "assay_type": {"agree": 659, "discrepancy": 0, "we_inferred": 0, "not_classified": 5381, "no_truth": 0, "discrepancy_categories": {}}, "reference_assembly": {"agree": 8, "discrepancy": 2, "we_inferred": 0, "not_classified": 3, "no_truth": 0, "discrepancy_categories": {"GRCh38 vs CHM13": {"ours": "GRCh38", "truth_mapped": "CHM13", "count": 2, "example": "hprc-v1.0-mc-chm13.grch38.vcf.gz"}}}}, "metadata_coverage": {"platform": 6040, "data_modality": 5840, "assay_type": 6040, "reference_assembly": 13}, "catalog_summary": [{"name": "sequencing-data", "total": 6048, "matched": 6040}, {"name": "alignments", "total": 89, "matched": 13}, {"name": "annotations", "total": 8739, "matched": 0}, {"name": "assemblies", "total": 560, "matched": 560}], "catalog_dimensions": {"sequencing-data": ["platform", "data_modality", "assay_type"], "alignments": ["reference_assembly"], "annotations": ["reference_assembly"], "assemblies": []}}}, "source_descriptions": {"AnVIL (Azul metadata)": "Validated against file-level metadata from the <a href=\"https://explore.anvilproject.org/\">AnVIL Data Explorer<\/a>.", "HPRC (sequencing catalog)": "Validated against sequencing, alignment, and annotation catalogs from the <a href=\"https://data.humanpangenome.org/\">HPRC Data Explorer<\/a>."}};

    const escapeHtml = (value) => {
      const div = document.createElement('div');
      div.textContent = value == null ? '' : String(value);
      return div.innerHTML;
    };

    const COLORS = {
      agree: '#2da44e',
      discrepancy: '#cf222e',
      we_inferred: '#bf8700',
      not_classified: '#d0d7de',
    };

    const DIM_LABELS = {
      data_modality: 'Data Modality',
      data_type: 'Data Type',
      platform: 'Platform',
      reference_assembly: 'Reference Assembly',
      assay_type: 'Assay Type',
    };

    document.getElementById('run-time').textContent = DATA.run_time;

    document.getElementById('subtitle').textContent =
      'Comparing meta-disco rule engine classifications against external ground truth.';

    // Summary cards — one per source
    const cardsEl = document.getElementById('summary-cards');
    for (const [sourceName, results] of Object.entries(DATA.sources)) {
      const dims = results.dimensions || {};
      const totalAgree = Object.values(dims).reduce((s, d) => s + (d.agree || 0), 0);
      const totalDisc = Object.values(dims).reduce((s, d) => s + (d.discrepancy || 0), 0);
      const totalCompared = totalAgree + totalDisc;
      const agreePct = totalCompared > 0 ? (100 * totalAgree / totalCompared).toFixed(1) : 'N/A';

      const card = document.createElement('div');
      card.className = 'summary-card';
      card.innerHTML = `
        <div class="label">${sourceName}</div>
        <div class="value" style="color: ${totalDisc === 0 ? '#2da44e' : '#cf222e'}">${agreePct}%</div>
        <div class="pct">${results.matched.toLocaleString()} files matched, ${totalDisc} discrepancies</div>
      `;
      cardsEl.appendChild(card);
    }

    // Tabs — one per source
    const tabBar = document.getElementById('tab-bar');
    const tabContents = document.getElementById('tab-contents');
    const sourceEntries = Object.entries(DATA.sources);
    const EMPTY = {agree:0, discrepancy:0, we_inferred:0, not_classified:0, no_truth:0, discrepancy_categories:{}};
    const ALL_DIMS = ['data_modality','data_type','platform','reference_assembly','assay_type'];

    sourceEntries.forEach(([sourceName, results], i) => {
      const tab = document.createElement('div');
      tab.className = 'tab' + (i === 0 ? ' active' : '');
      tab.textContent = sourceName;
      tab.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('source-tab-' + i).classList.add('active');
      };
      tabBar.appendChild(tab);

      const content = document.createElement('div');
      content.id = 'source-tab-' + i;
      content.className = 'tab-content' + (i === 0 ? ' active' : '');

      const sourceLabel = sourceName.includes('(') ? sourceName.split('(')[0].trim() : sourceName;
      const sourceDesc = (DATA.source_descriptions || {})[sourceName] || '';
      let html = '';

      // Source description with dataset listing
      const datasets = results.datasets || [];
      if (sourceDesc && datasets.length > 0) {
        const totalFiles = datasets.reduce((s, d) => s + d.count, 0);
        const sourceInfo = sourceDesc.replace(/\.$/, '');
        html += `<p>${sourceInfo}'s open-access projects with <strong>${totalFiles.toLocaleString()}</strong> files across <strong>${datasets.length}</strong> datasets: ${datasets.map(d => escapeHtml(d.name) + ' (' + d.count.toLocaleString() + ')').join(', ')}</p>`;
      } else if (sourceDesc) {
        html += `<p>${sourceDesc}</p>`;
      }

      // Metadata coverage table
      const metaCov = results.metadata_coverage || {};
      if (Object.keys(metaCov).length > 0) {
        html += `<h3>Metadata Overview</h3>`;
        html += `<p>${sourceLabel}'s open-access datasets currently populate the following genomic metadata dimensions:</p>`;
        html += `<table class="disc-table" style="width: auto; margin-bottom: 16px;"><tr><th>Dimension</th><th>Files with dimension in ${escapeHtml(sourceLabel)}</th></tr>`;
        for (const dim of ALL_DIMS) {
          const label = DIM_LABELS[dim] || dim;
          const count = metaCov[dim] || 0;
          html += `<tr><td>${label}</td><td style="text-align: right;">${count.toLocaleString()}</td></tr>`;
        }
        html += '</table>';
      }



      const dims = results.dimensions || {};

      // Per-dimension sections
      for (const dim of ALL_DIMS) {
        const stats = dims[dim] || EMPTY;
        const label = DIM_LABELS[dim] || dim;
        const available = stats.agree + stats.discrepancy + stats.not_classified;
        const bothHave = stats.agree + stats.discrepancy;
        const accuracy = bothHave > 0 ? `${(100 * stats.agree / bothHave).toFixed(1)}%` : '-';
        const agree_pct = bothHave > 0 ? (100 * stats.agree / bothHave).toFixed(1) : '0';
        const disc_pct = bothHave > 0 ? (100 * stats.discrepancy / bothHave).toFixed(1) : '0';

        html += `<h3>${label} Validation</h3>`;
        html += `<ul style="font-size: 14px; line-height: 1.8;">
          <li><strong>${available.toLocaleString()}</strong> files available from ${sourceLabel} with ground truth ${label}</li>
          <li><strong>${bothHave.toLocaleString()}</strong> files comparable (both source and rule engine have values)</li>
          <li><strong>${stats.not_classified.toLocaleString()}</strong> files not classified by rule engine</li>
          <li><strong>${stats.agree.toLocaleString()}</strong> inferred ${label.toLowerCase()} values match ${sourceLabel}</li>
          <li><strong>${stats.discrepancy.toLocaleString()}</strong> discrepancies</li>
          <li><strong>${accuracy}</strong> accuracy</li>
        </ul>`;

        // Summary paragraph
        const ll = label.toLowerCase();
        if (available > 0) {
          let summary = `Of the ${available.toLocaleString()} files on ${sourceLabel} with ground truth ${ll}, we inferred ${ll} values for ${bothHave.toLocaleString()} files. ${stats.not_classified.toLocaleString()} files remain unclassifiable by the rule engine.`;
          if (bothHave > 0) {
            summary += ` Of the ${bothHave.toLocaleString()} inferred ${ll} values, ${stats.agree.toLocaleString()} (${agree_pct}%) matched ${sourceLabel}. There were ${stats.discrepancy.toLocaleString()} discrepancies (${disc_pct}%) in ${ll} between meta-disco and ${sourceLabel}.`;
          }
          html += `<p style="font-size: 14px; color: #656d76;">${summary}</p>`;
        } else {
          html += `<p style="font-size: 14px; color: #656d76;">${sourceLabel} does not currently provide ground truth for ${ll}.</p>`;
        }

        // Stacked bar with labels (only files where source has ground truth)
        if (available > 0) {
          const SEG_LABELS = {agree: 'Agree', discrepancy: 'Discrepancy', not_classified: 'Not classified'};
          const segments = [
            { key: 'agree', count: stats.agree },
            { key: 'discrepancy', count: stats.discrepancy },
            { key: 'not_classified', count: stats.not_classified },
          ];
          html += '<div style="margin: 12px 0;"><div class="bar-row"><div class="bar-track">';
          for (const seg of segments) {
            if (seg.count > 0) {
              const w = (100 * seg.count / available).toFixed(1);
              const segLabel = `${SEG_LABELS[seg.key]}: ${seg.count.toLocaleString()}`;
              const showLabel = parseFloat(w) > 8;
              html += `<div class="bar-segment" style="width: ${w}%; background: ${COLORS[seg.key]}; position: relative;" title="${segLabel}">`;
              if (showLabel) {
                html += `<span style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.3); white-space: nowrap; overflow: hidden;">${seg.count.toLocaleString()}</span>`;
              }
              html += '</div>';
            }
          }
          html += '</div></div>';
          // Legend below bar
          html += '<div style="display: flex; gap: 16px; margin-top: 4px; font-size: 12px; color: #656d76;">';
          for (const seg of segments) {
            if (seg.count > 0) {
              html += `<span><span style="display: inline-block; width: 10px; height: 10px; border-radius: 2px; background: ${COLORS[seg.key]}; margin-right: 4px;"></span>${SEG_LABELS[seg.key]}: ${seg.count.toLocaleString()}</span>`;
            }
          }
          html += '</div></div>';
        }

        // Discrepancy categories
        const cats = stats.discrepancy_categories || {};
        const sortedCats = Object.values(cats).sort((a, b) => b.count - a.count);
        if (sortedCats.length > 0) {
          html += `<h4>Discrepancies</h4>`;
          html += `<table class="disc-table">
            <tr><th>Count</th><th>Inferred</th><th>${escapeHtml(sourceLabel)}</th><th>Example</th></tr>`;
          for (const cat of sortedCats) {
            html += `<tr>
              <td style="text-align: right;">${cat.count.toLocaleString()}</td>
              <td>${escapeHtml(cat.ours)}</td>
              <td>${escapeHtml(cat.truth_mapped)}</td>
              <td title="${escapeHtml(cat.example)}">${escapeHtml(cat.example)}</td>
            </tr>`;
          }
          html += '</table>';
        }
      }

      content.innerHTML = html;
      tabContents.appendChild(content);
    });
  </script>
</body>
</html>
