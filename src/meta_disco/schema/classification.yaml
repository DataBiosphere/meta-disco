id: https://github.com/DataBiosphere/meta-disco/blob/main/src/meta_disco/schema/classification.yaml
name: meta_disco_classification
title: Meta-Disco File Classification Model
description: >-
  Full classification data model for meta-disco: the five metadata dimensions,
  per-field evidence, classification status, and typed derivation edges. Supersedes
  the retired anvil_file.yaml stub (issue #33) and realizes the data-model decision
  record in docs/derived-file-data-model.md.

  Authoring source of truth. `make gen` generates JSON Schema and Pydantic from
  this file (via `gen-json-schema` / `gen-pydantic`) — do not hand-edit the
  generated copies. The schema's vocabulary backs the rule drift check
  (tests/test_rule_vocabulary.py), and `ClassificationRecord` now matches the
  pipeline output shape (`{..., "classifications": {...}}`, see
  docs/derived-file-data-model.md section 5a) so whole records validate against it
  (schema/tests/test_output_validation.py, run closed=False, so any unmodeled key is
  tolerated; in practice the pipeline's only such extras are the fastq scalar hints
  inside `classifications` — modeling them is a #134 follow-up).
  Adopting typed records in the pipeline is done: `run()` parses each routed record
  into a typed view at the load boundary (`src/meta_disco/records.py`, #172).

prefixes:
  linkml: https://w3id.org/linkml/
  anvil: https://github.com/DataBiosphere/meta-disco/schema/
default_prefix: anvil
default_range: string

imports:
  - linkml:types

# =============================================================================
# CLASSES
# =============================================================================
classes:

  ClassificationRecord:
    tree_root: true
    description: >-
      One classified file. `classifications` carries the file's identity (the
      five dimension fields — what it is); derived_from is a typed edge to the
      file it was derived from (where it came from). Matches the pipeline output
      shape (see docs/derived-file-data-model.md section 5a).
    slots:
      - md5sum
      - file_name
      - file_format
      - file_size
      - entry_id
      - dataset_title
      - classifications
      - derived_from

  Classifications:
    description: >-
      The five metadata dimensions for one file, each a Classification entry.
      The pipeline also emits some file-type-specific scalar hints here (e.g.
      fastq's is_paired_end / instrument_model); those are not modeled yet and
      pass under the gate's closed=False mode (see #134 follow-up).
    slots:
      - data_modality
      - data_type
      - reference_assembly
      - assay_type
      - platform
    slot_usage:
      data_modality:
        range: DataModalityClassification
        required: true
      data_type:
        range: DataTypeClassification
        required: true
      reference_assembly:
        range: ReferenceAssemblyClassification
        required: true
      assay_type:
        range: AssayTypeClassification
        required: true
      platform:
        range: PlatformClassification
        required: true

  Classification:
    abstract: true
    description: >-
      A single classified field: its resolved value (null unless status is
      'classified'), a status sentinel, and the evidence behind it. Subclasses
      narrow `value` to the right enum per dimension.
    slots:
      - value
      - status
      - evidence

  DataModalityClassification:
    is_a: Classification
    slot_usage:
      value:
        range: data_modality_enum

  DataTypeClassification:
    is_a: Classification
    slot_usage:
      value:
        range: data_type_enum

  ReferenceAssemblyClassification:
    is_a: Classification
    slot_usage:
      value:
        range: reference_assembly_enum

  AssayTypeClassification:
    is_a: Classification
    slot_usage:
      value:
        range: assay_type_enum

  PlatformClassification:
    is_a: Classification
    slot_usage:
      value:
        range: platform_enum

  Evidence:
    description: >-
      One piece of supporting evidence. Either a claim from a rule or content
      classifier (carries rule_id + tier), or a synthetic resolution marker
      (carries marker, no rule_id) recording that no claim was made or that
      claims conflicted.
    slots:
      - rule_id
      - marker
      - reason
      - value
      - status
      - tier
      - competing_values
      - source_type
      - authority
      - reference
    slot_usage:
      # A rule's claimed value / status for this dimension, and the rule tier it
      # fired at. status is optional on evidence (only sentinel-bearing evidence
      # carries it), unlike the required status on a Classification entry.
      status:
        required: false

  DerivationEdge:
    description: >-
      Typed link from a derived file to the file it was derived from. The verb
      (relation) and parent_kind are the type — knowable from the filename;
      parent_md5sum is the grounding, which may be null when the parent cannot
      be resolved. See docs/derived-file-data-model.md.
    slots:
      - relation
      - parent_md5sum
      - parent_file
      - parent_kind

# =============================================================================
# SLOTS
# =============================================================================
slots:
  md5sum:
    description: MD5 checksum of the file; primary key for records.
    identifier: true
  file_name:
    description: The file name.
  file_format:
    description: File extension / compound extension (e.g. .bam, .vcf.gz).
  file_size:
    description: File size in bytes.
    range: integer
  entry_id:
    description: Source catalog entry identifier the record was classified from.
  dataset_title:
    description: Title of the dataset the file belongs to.
  classifications:
    description: The five classified dimensions for this file.
    range: Classifications
    required: true
    inlined: true

  # --- the five dimensions (ranges narrowed to *Classification in slot_usage) ---
  data_modality:
    description: The biological signal the file carries.
  data_type:
    description: The content type of the file (biological or descriptive class).
  reference_assembly:
    description: The reference genome the file's coordinates are expressed against.
  assay_type:
    description: The experimental assay that produced the upstream data.
  platform:
    description: The sequencing platform / instrument family.

  derived_from:
    description: Typed derivation edge to the parent file, if this is a derived file.
    range: DerivationEdge

  # --- Classification sub-fields ---
  value:
    description: The resolved value; null unless status is 'classified'.
    required: false
  status:
    description: Whether the field was classified, is not applicable, etc.
    range: classification_status_enum
    required: true
  evidence:
    range: Evidence
    multivalued: true
    inlined_as_list: true

  # --- Evidence sub-fields ---
  rule_id:
    description: >-
      Identifier of the rule or content classifier that produced this evidence.
      Absent on synthetic resolution markers, which carry `marker` instead.
  marker:
    description: >-
      Kind of synthetic resolution marker, when this entry is not a claim but a
      note about the outcome: `not_classified` (no rule determined a value) or
      `conflict` (claims disagreed at the top tier). Absent on real claims.
    range: evidence_marker_enum
  reason:
    description: Human-readable rationale.
  tier:
    description: The tier at which this evidence fired.
    range: integer
  competing_values:
    description: >-
      On a `conflict` marker, the disagreeing top-tier values that made the field
      ambiguous. Absent on claims and on the `not_classified` marker.
    multivalued: true
    range: string
  source_type:
    description: "Kind of source that produced this evidence (provenance, #90)."
    range: source_type_enum
  authority:
    description: The authority the claim rests on.
  reference:
    description: A URL or identifier backing the claim, if any.

  # --- DerivationEdge sub-fields ---
  relation:
    description: The derivation verb.
    range: relation_enum
    required: true
  parent_md5sum:
    description: md5sum of the parent file; null if the edge is ungrounded.
  parent_file:
    description: Name of the parent file.
  parent_kind:
    description: The kind of file the parent is.
    range: parent_kind_enum

# =============================================================================
# ENUMS  (the controlled vocabulary — the canonical source of truth)
# =============================================================================
enums:

  data_modality_enum:
    description: The biological signal a file carries. Dotted values are hierarchical.
    permissible_values:
      genomic:
        # meaning: <OBI/EDAM CURIE>   # LinkML supports ontology mapping here
      "transcriptomic.bulk":
      "transcriptomic.single_cell":
      "epigenomic.chromatin_accessibility":
      "epigenomic.histone_modification":
      "epigenomic.methylation":
      "imaging.histology":

  data_type_enum:
    description: >-
      Content type, spanning two classes. BIOLOGICAL: the bytes are the signal.
      DESCRIPTIVE: the bytes are about another file. (See data-model doc 8c.)
    permissible_values:
      # --- biological class ---
      alignments:
      reads:
      sequence:
      assembly:
      "assembly.reference":   # a published reference genome (e.g. GRCh38/CHM13); de-novo stays `assembly`
      pangenome:              # a sequence graph (GFA/rGFA/GBZ/vg/GBWT/xg); linear sequence is FASTA (`sequence`/`assembly`)
      "pangenome.reference":  # a graph used as an alignment reference (e.g. HPRC minigraph-cactus)
      variants:
      "variants.germline":
      "variants.somatic":
      "variants.structural":
      "variants.cnv":
      genotypes:
      expression_matrix:      # a features × samples abundance matrix
      quantification:         # one sample's per-feature abundance table (e.g. Salmon quant.sf); not a features × samples matrix (cf. expression_matrix)
      annotations:
      peaks:
      signal:
      raw_signal:
      array_signal:
      images:
      # --- descriptive class ---
      index:
      checksum:
      statistics:
      log:
      interval_set:
      archive:

  reference_assembly_enum:
    permissible_values:
      GRCh37:
      GRCh38:
      CHM13:
      # GRCm39:  # mouse — pending issue #15

  assay_type_enum:
    permissible_values:
      WGS:
      WES:
      "RNA-seq":
      "ATAC-seq":
      "ChIP-seq":
      "Bisulfite-seq":
      "Methylation array":
      Histology:

  platform_enum:
    permissible_values:
      ILLUMINA:
      PACBIO:
      ONT:
      MGI:
      ELEMENT:
      ULTIMA:

  classification_status_enum:
    description: >-
      Why a field has (or lacks) a value. Replaces sentinel values that were
      previously smuggled into each dimension enum (not_applicable /
      not_classified). See issues #56, #88.
    permissible_values:
      classified:
        description: A value was determined.
      not_applicable:
        description: The field has no meaning for this file.
      not_classified:
        description: The field is meaningful but no value could be determined.
      conflict:
        description: Multiple rules disagreed at the same tier.

  relation_enum:
    description: >-
      Derivation verbs we can currently detect. subset_of / merged_from /
      member_of are intentionally held back until detectable (data-model doc 8d).
    permissible_values:
      index_of:
      checksum_of:
      summarizes:
      lifted_over_from:
      derived_from:   # generic fallback: related, verb unknown

  parent_kind_enum:
    description: The kind of file a derivation edge points at.
    permissible_values:
      alignment:
      variants:
      reads:
      sequence:
      intervals:
      signal:
      expression_matrix:
      genotypes:
      any:

  source_type_enum:
    description: "Kind of source behind a piece of evidence (provenance model, #90)."
    permissible_values:
      header_rule:
      filename_rule:
      contig_detection:
      external_ground_truth:
      repository_metadata:
      derivation_inheritance:
      wrangler_annotation:

  evidence_marker_enum:
    description: >-
      Kind of synthetic resolution marker on an evidence entry (issue #228): a
      note that no claim was made or that claims conflicted, rather than a claim.
    permissible_values:
      not_classified:
        description: No rule or content classifier determined a value.
      conflict:
        description: Claims disagreed at the top tier, so the field is ambiguous.
