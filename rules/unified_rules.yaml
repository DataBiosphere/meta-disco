      data_type: reads
    confidence: 0.85
    rationale: "Generic PacBio read names follow @movie/zmw format"
    terminal: false

  # ---------------------------------------------------------------------------
  # ONT read name patterns
  # ---------------------------------------------------------------------------
  - id: fastq_ont_uuid
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    then:
      platform: ONT
      data_type: reads
    confidence: 0.95
    rationale: "ONT read names are UUIDs (format: 8-4-4-4-12 hex characters). Uniquely identifies Oxford Nanopore data"
    terminal: false

  - id: fastq_ont_metadata
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "runid=[a-f0-9]+"
    then:
      platform: ONT
      data_type: reads
    confidence: 0.95
    rationale: "ONT reads often include 'runid=' metadata in the header line"
    terminal: false

  # ---------------------------------------------------------------------------
  # MGI/BGI read name patterns
  # ---------------------------------------------------------------------------
  - id: fastq_mgi
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@[A-Z]\\d{9}L\\dC\\d{3}R\\d{3}\\d+"
    then:
      platform: MGI
    confidence: 0.90
    rationale: "MGI/BGI-SEQ read names follow @flowcellLaneCcolumnRrow format"
    terminal: false

  - id: fastq_mgi_alt
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@[A-Z]\\d+L\\d+C\\d+R\\d+"
    then:
      platform: MGI
    confidence: 0.85
    rationale: "Alternative MGI/BGI read name format with varying digit lengths"
    terminal: false

  # ---------------------------------------------------------------------------
  # Element Biosciences patterns
  # ---------------------------------------------------------------------------
  - id: fastq_element
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@[A-Z0-9]+:[A-Z0-9]+:\\d+:\\d+:\\d+:\\d+:\\d+"
    then:
      platform: ELEMENT
    confidence: 0.80
    rationale: "Element Biosciences AVITI read names follow a similar format to Illumina"
    terminal: false

  # ---------------------------------------------------------------------------
  # Ultima Genomics patterns
  # ---------------------------------------------------------------------------
  - id: fastq_ultima
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@[A-Z0-9]+_\\d+_\\d+_\\d+_[ACGT]+"
    then:
      platform: ULTIMA
    confidence: 0.80
    rationale: "Ultima Genomics read names include flow-space encoded sequences"
    terminal: false

  # ---------------------------------------------------------------------------
  # Archive accession patterns (ENA/SRA)
  # ---------------------------------------------------------------------------
  - id: fastq_ena_err
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@ERR\\d+\\.\\d+"
    then: {}
    confidence: 0.60
    rationale: "ERR accessions indicate data from the European Nucleotide Archive (ENA)"
    terminal: false

  - id: fastq_sra_srr
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@SRR\\d+\\.\\d+"
    then: {}
    confidence: 0.60
    rationale: "SRR accessions indicate data from NCBI Sequence Read Archive (SRA)"
    terminal: false

  - id: fastq_ddbj_drr
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@DRR\\d+\\.\\d+"
    then: {}
    confidence: 0.60
    rationale: "DRR accessions indicate data from DDBJ Sequence Read Archive (Japan)"
    terminal: false

  # ---------------------------------------------------------------------------
  # Paired-end detection (works across platforms)
  # ---------------------------------------------------------------------------
  - id: fastq_paired_end
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "[/\\s][12]$|[/\\s][12]:|_R[12]_|\\.R[12]\\.|_r[12]_|\\.r[12]\\."
    then: {}
    confidence: 0.80
    rationale: "Read 1/2 indicators (/1, /2, _R1_, _R2_) suggest paired-end sequencing"
    terminal: false

  # ---------------------------------------------------------------------------
  # Default for FASTQ when no modality signal found
  # ---------------------------------------------------------------------------
  - id: fastq_modality_unknown
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      modality_not_set: true
    then:
      data_modality: not_classified
    confidence: 0.0
    rationale: "FASTQ modality cannot be determined from reads alone — could be genomic, transcriptomic, or epigenomic depending on assay"
    terminal: false

  # ===========================================================================
  # FALLBACK RULES
  # ===========================================================================

  - id: alignment_fallback
    tier: 2
    scope: filename
    when:
      extensions: [".bam", ".cram", ".sam", ".sam.gz"]
      modality_not_set: true
    then:
      needs_header_inspection: true
    confidence: 0.0
    rationale: "No modality indicators found; requires BAM header inspection"
    terminal: false

  - id: variant_needs_header
    tier: 2
    scope: filename
    when:
      extensions: [".vcf", ".vcf.gz", ".bcf", ".gvcf", ".gvcf.gz", ".g.vcf.gz"]
      reference_not_set: true
    then:
      needs_header_inspection: true
    confidence: 0.0
    rationale: "Reference assembly not in filename; check VCF header"
    terminal: false

  - id: reads_fallback
    tier: 2
    scope: filename
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      modality_not_set: true
    then:
      needs_study_context: true
    confidence: 0.0
    rationale: "FASTQ modality ambiguous; requires study context"
    terminal: false

  - id: signal_fallback
    tier: 2
    scope: filename
    when:
      extensions: [".bigwig", ".bw", ".bigWig", ".bedGraph"]
      modality_not_set: true
    then:
      needs_study_context: true
    confidence: 0.0
    rationale: "Signal track modality unclear - needs study context"
    terminal: true

  - id: intervals_fallback
    tier: 2
    scope: filename
    when:
      extensions: [".bed", ".bed.gz", ".narrowpeak", ".broadpeak"]
      modality_not_set: true
    then:
      data_modality: genomic
      data_type: annotations
      needs_study_context: true
    confidence: 0.60
    rationale: "BED file with no specific pattern - defaulting to genomic intervals"
    terminal: true

  - id: fasta_fallback
    tier: 2
    scope: filename
    when:
      extensions: [".fasta", ".fa", ".fasta.gz", ".fa.gz"]
      modality_not_set: true
    then:
      needs_header_inspection: true
    confidence: 0.0
    rationale: "FASTA modality ambiguous; requires header inspection"
    terminal: false

  - id: archive_fallback
    tier: 2
    scope: filename
    when:
      extensions: [".tar", ".tar.gz", ".zip"]
      modality_not_set: true
    then:
      needs_manual_review: true
    confidence: 0.0
    rationale: "Archive contents unknown - needs inspection"
    terminal: true

  - id: image_fallback
    tier: 2
    scope: filename
    when:
      extensions: [".png", ".jpg", ".tiff", ".tif"]
      modality_not_set: true
    then:
      needs_manual_review: true
    confidence: 0.0
    rationale: "Image purpose unclear"
    terminal: true

  - id: text_fallback
    tier: 2
    scope: filename
    when:
      extensions: [".txt", ".tsv", ".csv"]
      modality_not_set: true
    then:
      needs_manual_review: true
    confidence: 0.0
    rationale: "Ambiguous text file - requires manual review"
    terminal: true

  - id: unknown_extension_fallback
    tier: 2
    scope: filename
    when:
      modality_not_set: true
    then:
      needs_manual_review: true
    confidence: 0.0
    rationale: "Unknown file extension - requires manual review"
    terminal: false  # Allow tier 3 header rules to run

---
# =============================================================================
# VALIDATOR CONFIGURATIONS
# =============================================================================
# Complex matching logic that requires Python code

validators:
  contig_length_detector:
    description: "Detect reference assembly from chromosome lengths in @SQ or ##contig lines"
    module: "meta_disco.validators.contig_lengths"
    function: "detect_reference_from_contig_lengths"
    applies_to: ["header", "vcf_header"]
    confidence: 0.98

  max_position_detector:
    description: "Detect reference assembly by ruling out references where variant positions exceed chromosome lengths"
    module: "meta_disco.validators.contig_lengths"
    function: "detect_reference_from_max_positions"
    applies_to: ["vcf_header"]
    confidence: 0.90

  illumina_read_parser:
    description: "Parse Illumina read names to extract instrument, flowcell, lane"
    module: "meta_disco.validators.read_name_parsers"
    function: "parse_illumina_read_name"
    applies_to: ["fastq_header"]

  pacbio_read_parser:
    description: "Parse PacBio read names to extract movie, ZMW, read type"
    module: "meta_disco.validators.read_name_parsers"
    function: "parse_pacbio_read_name"
    applies_to: ["fastq_header"]

  ont_read_parser:
    description: "Parse ONT read names to extract UUID and metadata"
    module: "meta_disco.validators.read_name_parsers"
    function: "parse_ont_read_name"
    applies_to: ["fastq_header"]

  illumina_instrument_model:
    description: "Infer Illumina instrument model from instrument ID prefix"
    module: "meta_disco.validators.read_name_parsers"
    function: "infer_illumina_instrument_model"
    applies_to: ["header", "fastq_header"]

---
# =============================================================================
# ASSAY TYPE INFERENCE RULES
# =============================================================================
# Priority-ordered rules for inferring assay type from other signals

assay_type_rules:
  - id: rnaseq_program
    priority: 100
    conditions:
      matched_rules_any:
        - program_star
        - program_hisat2
        - program_tophat
        - program_salmon
        - program_kallisto
        - program_isoseq
    assay_type: RNA-seq

  - id: rnaseq_modality
    priority: 95
    conditions:
      data_modality_contains: transcriptomic
    assay_type: RNA-seq

  - id: wgs_longread
    priority: 80
    conditions:
      platform_in: [PACBIO, ONT]
    assay_type: WGS

  - id: wgs_illumina_bam_large
    priority: 50
    conditions:
      platform: ILLUMINA
      file_format_not: ".cram"
      file_size_gb_gt: 50
    assay_type: WGS

  - id: wgs_illumina_bam_medium
    priority: 50
    conditions:
      platform: ILLUMINA
      file_format_not: ".cram"
      file_size_gb_gt: 20
      file_size_gb_lt: 50
    assay_type: WGS

  - id: wes_illumina_bam_small
    priority: 50
    conditions:
      platform: ILLUMINA
      file_format_not: ".cram"
      file_size_gb_lt: 20
    assay_type: WES

  - id: wgs_illumina_cram_large
    priority: 50
    conditions:
      platform: ILLUMINA
      file_format: ".cram"
      file_size_gb_gt: 20
    assay_type: WGS

  - id: wgs_illumina_cram_medium
    priority: 50
    conditions:
      platform: ILLUMINA
      file_format: ".cram"
      file_size_gb_gt: 8
      file_size_gb_lt: 20
    assay_type: WGS

  - id: wes_illumina_cram_small
    priority: 50
    conditions:
      platform: ILLUMINA
      file_format: ".cram"
      file_size_gb_lt: 8
    assay_type: WES

