# Meta-Disco Unified Classification Rules
# ========================================
#
# PURPOSE
# -------
# This file contains all rules for classifying biological data files (BAM, CRAM,
# FASTQ, VCF, BED, etc.) to determine their data_modality (genomic, transcriptomic,
# epigenomic), reference_assembly (GRCh38, GRCh37, CHM13), and other metadata.
#
# The rule engine is used by the AnVIL Explorer and Terra Data Repository to
# automatically classify files based on filename patterns, file size, and
# optionally BAM/VCF/FASTQ headers.
#
#
# HOW THE RULE ENGINE WORKS
# -------------------------
# 1. EXTENSION EXTRACTION: The engine first extracts the file extension,
#    handling compound extensions like .vcf.gz, .fastq.gz, .g.vcf.gz
#
# 2. RULE FILTERING: Only rules matching the file's extension are considered.
#    Rules without an 'extensions' constraint apply to ALL files.
#
# 3. TIERED EXECUTION: Rules execute in tier order (1 → 2 → 3):
#    - Tier 1: Extension-only rules (fastest, always available)
#    - Tier 2: Filename pattern and file size rules
#    - Tier 3: Header-based rules (requires reading file headers)
#
# 4. CONDITION EVALUATION: All conditions in 'when' must match (AND logic).
#    If any condition fails, the rule is skipped.
#
# 5. EFFECT APPLICATION: When a rule matches, all effects in 'then' are applied.
#    Effects accumulate across rules unless a field is already set.
#
# 6. TERMINAL RULES: If terminal=true and the rule matches, processing stops
#    immediately. Use for definitive classifications.
#
# 7. CONFIDENCE & REASONS: Each matching rule adds its rationale to the reasons
#    list. The highest confidence from matching rules is used.
#
#
# KEY CONCEPTS
# ------------
# - data_modality: What biological data type (genomic, transcriptomic.bulk,
#   epigenomic.methylation, imaging.histology, etc.)
#
# - data_type: File content type (alignments, variants, reads, peaks, signal, etc.)
#
# - reference_assembly: Reference genome (GRCh38, GRCh37, CHM13, or null for
#   unaligned/raw data)
#
# - assay_type: Experimental method (WGS, WES, RNA-seq, ATAC-seq, ChIP-seq, etc.)
#
# - platform: Sequencing platform (ILLUMINA, PACBIO, ONT, MGI)
#
# - skip: Files to ignore (indices, checksums, logs)
#
# - needs_*: Flags indicating more information needed for classification
#
#
# FILE STRUCTURE (Multi-document YAML)
# ------------------------------------
# This file contains multiple YAML documents separated by '---':
#
# 1. extension_map: Maps extensions to file type categories
# 2. rules: The classification rules (main content)
# 3. validators: Python validator configurations for complex logic
# 4. assay_type_rules: Rules for inferring WGS/WES/RNA-seq from signals
# 5. illumina_instruments: Instrument ID prefix to model mapping
# 6. reference_contig_lengths: Chromosome sizes for reference detection
#
#
# RULE SCHEMA
# -----------
# - id: unique rule identifier (required)
# - tier: 1=extension, 2=filename, 3=header (required)
# - scope: extension|filename|header|vcf_header|fastq_header|file_size (required)
# - when: conditions that must all match (required)
# - then: effects to apply when rule matches (required)
# - confidence: 0.0-1.0 confidence score (default: 0.0)
# - rationale: explanation for this classification (recommended)
# - terminal: if true, stop processing after this rule matches (default: false)
#
#
# CONDITION TYPES (in 'when')
# ---------------------------
# Extension/filename conditions:
# - extensions: list of file extensions to match (e.g., [".bam", ".cram"])
# - filename_pattern: regex pattern for filename (case-insensitive)
# - dataset_pattern: regex pattern for dataset title
# - file_format: required format (.bam, .cram, etc)
#
# File size conditions:
# - file_size_min_gb: minimum file size in GB
# - file_size_max_gb: maximum file size in GB
#
# State conditions (for rule ordering):
# - modality_not_set: true if data_modality must be unset
# - reference_not_set: true if reference_assembly must be unset
# - platform: required platform value (ILLUMINA, PACBIO, ONT)
#
# Header conditions (tier 3):
# - header_section: BAM header section (@HD, @RG, @PG, @SQ)
# - header_field: field within section (PL, PN, SN, AS, DS)
# - header_pattern: regex pattern to match in field value
# - header_absent: true if header section should NOT exist
# - vcf_header_type: VCF header line type (##reference, ##source, ##contig)
# - vcf_pattern: regex pattern for VCF header content
# - fastq_pattern: regex pattern for FASTQ read name
#
#
# EFFECT TYPES (in 'then')
# ------------------------
# Classification fields:
# - data_modality: set data modality (genomic, transcriptomic.bulk, etc.)
# - data_type: set data type (alignments, variants, reads, peaks, etc.)
# - reference_assembly: set reference (GRCh38, GRCh37, CHM13)
# - assay_type: set assay type (WGS, WES, RNA-seq, ATAC-seq, etc.)
# - platform: set sequencing platform (ILLUMINA, PACBIO, ONT, MGI)
# - file_category: set category (qc_stats, reference_intervals, etc.)
#
# Control flags:
# - skip: true to mark file for skipping (indices, checksums)
# - needs_header_inspection: true to flag for header analysis
# - needs_study_context: true to flag for study context needed
# - needs_manual_review: true to flag for human review
#
#
# TIPS FOR REVIEWING/EDITING RULES
# --------------------------------
# 1. Check rule order matters within a tier - first match wins for terminal rules
# 2. More specific patterns should come before general patterns
# 3. Use terminal=true for definitive classifications to avoid override
# 4. Use modality_not_set/reference_not_set for fallback rules
# 5. Confidence should reflect certainty: 0.95 for definitive, 0.60-0.80 for heuristics
# 6. Always provide a rationale explaining the classification logic
# 7. Test regex patterns - they're case-insensitive by default
#
#
# CONSOLIDATED FROM
# -----------------
# 1. rules/classification_rules.yaml (extension, filename rules)
# 2. src/meta_disco/header_classifier.py (header rules)
# 3. scripts/classify_bed_files.py (BED file patterns)
# 4. scripts/classify_images.py (image extensions)
# 5. scripts/classify_auxiliary_genomic.py (FAST5/POD5/PLINK)

# =============================================================================
# EXTENSION MAP
# =============================================================================
# Maps file extensions to file type categories for rule chain selection

extension_map:
  # Alignments
  ".bam": alignment
  ".cram": alignment
  ".sam": alignment
  ".sam.gz": alignment

  # Variants
  ".vcf": variant
  ".vcf.gz": variant
  ".bcf": variant
  ".gvcf": variant
  ".gvcf.gz": variant
  ".g.vcf.gz": variant

  # Sequencing reads
  ".fastq": reads
  ".fq": reads
  ".fastq.gz": reads
  ".fq.gz": reads

  # Genomic intervals/regions
  ".bed": intervals
  ".bed.gz": intervals
  ".narrowpeak": intervals
  ".broadpeak": intervals

  # Signal tracks
  ".bigwig": signal
  ".bw": signal
  ".bigWig": signal
  ".bedGraph": signal

  # Indices (skip - inherit from parent)
  ".bai": index
  ".crai": index
  ".tbi": index
  ".csi": index
  ".fai": index
  ".idx": index
  ".pbi": index

  # Checksums (skip)
  ".md5": checksum

  # Genotyping (PLINK)
  ".pgen": genotype_plink
  ".pvar": genotype_plink
  ".psam": genotype_plink

  # Single-cell matrices
  ".h5ad": single_cell_matrix
  ".loom": single_cell_matrix
  ".mtx": single_cell_matrix
  ".mtx.gz": single_cell_matrix

  # Methylation arrays
  ".idat": methylation_array

  # Nanopore raw signal
  ".fast5": nanopore
  ".pod5": nanopore
  ".fast5.tar": nanopore
  ".fast5.tar.gz": nanopore

  # Images
  ".svs": histology_image
  ".tiff": image
  ".tif": image
  ".png": image
  ".jpg": image

  # Sequences (FASTA)
  ".fasta": sequence
  ".fa": sequence
  ".fasta.gz": sequence
  ".fa.gz": sequence

  # Archives (need special handling)
  ".tar": archive
  ".tar.gz": archive
  ".zip": archive

  # Text/tabular (ambiguous)
  ".txt": text_ambiguous
  ".tsv": text_ambiguous
  ".csv": text_ambiguous
  ".log": log_file

---
# =============================================================================
# UNIFIED RULES
# =============================================================================

rules:

  # ===========================================================================
  # TIER 1: EXTENSION-BASED RULES
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Index files - skip classification
  # ---------------------------------------------------------------------------
  - id: index_skip
    tier: 1
    scope: extension
    when:
      extensions: [".bai", ".crai", ".tbi", ".csi", ".fai", ".idx", ".pbi"]
    then:
      skip: true
    confidence: 1.0
    rationale: "Index file - inherits classification from parent data file"
    terminal: true

  # ---------------------------------------------------------------------------
  # Checksum files - skip classification
  # ---------------------------------------------------------------------------
  - id: checksum_skip
    tier: 1
    scope: extension
    when:
      extensions: [".md5"]
    then:
      skip: true
    confidence: 1.0
    rationale: "Checksum file - not data"
    terminal: true

  # ---------------------------------------------------------------------------
  # Chunked upload artifacts - skip classification
  # ---------------------------------------------------------------------------
  - id: chunked_upload_skip
    tier: 1
    scope: filename
    when:
      filename_pattern: "gs-chunked-io-part\\.\\d+"
    then:
      skip: true
    confidence: 1.0
    rationale: "Incomplete chunked upload artifact from Google Cloud Storage - not usable data"
    terminal: true

  # ---------------------------------------------------------------------------
  # Bare timestamp filenames - skip classification
  # ---------------------------------------------------------------------------
  - id: timestamp_filename_skip
    tier: 1
    scope: filename
    when:
      filename_pattern: "^\\d{4}-\\d{2}-\\d{2}T\\d{6}\\.\\d+Z$"
    then:
      skip: true
    confidence: 1.0
    rationale: "Bare ISO timestamp filename - metadata artifact, not data"
    terminal: true

  # ---------------------------------------------------------------------------
  # Log files - skip classification
  # ---------------------------------------------------------------------------
  - id: log_skip
    tier: 1
    scope: extension
    when:
      extensions: [".log"]
    then:
      skip: true
    confidence: 1.0
    rationale: "Log file - not data"
    terminal: true

  # ---------------------------------------------------------------------------
  # VCF files - genomic by default
  # ---------------------------------------------------------------------------
  - id: variant_default_genomic
    tier: 1
    scope: extension
    when:
      extensions: [".vcf", ".vcf.gz", ".bcf", ".gvcf", ".gvcf.gz", ".g.vcf.gz"]
    then:
      data_modality: genomic
      data_type: variants
    confidence: 0.85
    rationale: "VCF files contain variant calls (genomic data)"
    terminal: false

  # ---------------------------------------------------------------------------
  # PLINK genotype files
  # ---------------------------------------------------------------------------
  - id: plink_genomic
    tier: 1
    scope: extension
    when:
      extensions: [".pgen", ".pvar", ".psam"]
    then:
      data_modality: genomic
      data_type: genotypes
    confidence: 0.95
    rationale: "PLINK files contain genotype data (genomic)"
    terminal: false

  # ---------------------------------------------------------------------------
  # Methylation array files
  # ---------------------------------------------------------------------------
  - id: idat_methylation
    tier: 1
    scope: extension
    when:
      extensions: [".idat"]
    then:
      data_modality: epigenomic.methylation
      data_type: array_signal
      assay_type: Methylation array
    confidence: 0.95
    rationale: "IDAT files are Illumina methylation array data"
    terminal: true

  # ---------------------------------------------------------------------------
  # Single-cell matrix files
  # ---------------------------------------------------------------------------
  - id: sc_matrix_default
    tier: 1
    scope: extension
    when:
      extensions: [".h5ad", ".loom", ".mtx", ".mtx.gz"]
    then:
      data_modality: transcriptomic.single_cell
      data_type: expression_matrix
    confidence: 0.90
    rationale: "Single-cell matrix format indicates scRNA-seq"
    terminal: false

  # ---------------------------------------------------------------------------
  # Histology images (SVS)
  # ---------------------------------------------------------------------------
  - id: image_svs_histology
    tier: 1
    scope: extension
    when:
      extensions: [".svs"]
    then:
      data_modality: imaging.histology
      data_type: images
      assay_type: Histology
      platform: not_applicable
      reference_assembly: not_applicable
    confidence: 0.95
    rationale: "SVS files are Aperio whole-slide histology images used for pathology analysis"
    terminal: true

  # ---------------------------------------------------------------------------
  # PNG images - derived/QC plots
  # ---------------------------------------------------------------------------
  - id: image_png_derived
    tier: 1
    scope: extension
    when:
      extensions: [".png"]
    then:
      data_modality: not_applicable
      data_type: images
      platform: not_applicable
      reference_assembly: not_applicable
      assay_type: not_applicable
    confidence: 0.90
    rationale: "PNG files are derived visualizations (QC plots, assembly graphs) - not primary experimental data"
    terminal: false

  # ---------------------------------------------------------------------------
  # Nanopore raw signal files
  # ---------------------------------------------------------------------------
  - id: nanopore_fast5
    tier: 1
    scope: extension
    when:
      extensions: [".fast5", ".fast5.tar", ".fast5.tar.gz"]
    then:
      data_type: raw_signal
      platform: ONT
      reference_assembly: not_applicable
    confidence: 0.90
    rationale: "FAST5 files contain raw Oxford Nanopore electrical signal data. Reference not applicable until basecalling/alignment"
    terminal: false

  - id: nanopore_pod5
    tier: 1
    scope: extension
    when:
      extensions: [".pod5"]
    then:
      data_type: raw_signal
      platform: ONT
      reference_assembly: not_applicable
    confidence: 0.90
    rationale: "POD5 files contain raw Oxford Nanopore electrical signal data (newer format replacing FAST5)"
    terminal: false

  # ---------------------------------------------------------------------------
  # FASTQ/FQ - raw sequencing reads (unaligned, no reference)
  # ---------------------------------------------------------------------------
  - id: reads_base
    tier: 1
    scope: extension
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
    then:
      data_type: reads
      reference_assembly: not_applicable
    confidence: 0.50
    rationale: "FASTQ files contain raw sequencing reads. Reference not applicable until alignment"
    terminal: false

  # ---------------------------------------------------------------------------
  # FASTA files - sequence data (assembly, reference, or transcriptome)
  # ---------------------------------------------------------------------------
  - id: fasta_base
    tier: 1
    scope: extension
    when:
      extensions: [".fasta", ".fa", ".fasta.gz", ".fa.gz"]
    then:
      data_type: sequence
      platform: not_applicable
      assay_type: not_applicable
      needs_header_inspection: true
    confidence: 0.30
    rationale: "FASTA file detected; header inspection needed to determine if de novo assembly, reference genome, or transcript sequences"
    terminal: false

  # ===========================================================================
  # TIER 2: FILENAME-BASED RULES
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Alignment files - RNA-seq indicators
  # ---------------------------------------------------------------------------
  - id: alignment_rnaseq_filename
    tier: 2
    scope: filename
    when:
      extensions: [".bam", ".cram", ".sam", ".sam.gz"]
      filename_pattern: "(?i)_rna_|rnaseq|rna-seq|transcriptome|_RNA\\."
    then:
      data_modality: transcriptomic.bulk
      data_type: alignments
    confidence: 0.80
    rationale: "Filename contains RNA-seq indicator"
    terminal: false

  - id: alignment_scrna_filename
    tier: 2
    scope: filename
    when:
      extensions: [".bam", ".cram", ".sam", ".sam.gz"]
      filename_pattern: "(?i)scrna|sc_rna|single.?cell|10x|chromium"
    then:
      data_modality: transcriptomic.single_cell
      data_type: alignments
    confidence: 0.85
    rationale: "Filename contains single-cell RNA indicator"
    terminal: false

  - id: alignment_atac_filename
    tier: 2
    scope: filename
    when:
      extensions: [".bam", ".cram", ".sam", ".sam.gz"]
      filename_pattern: "(?i)atac|_ATAC_"
    then:
      data_modality: epigenomic.chromatin_accessibility
      data_type: alignments
      assay_type: ATAC-seq
    confidence: 0.85
    rationale: "Filename contains ATAC-seq indicator"
    terminal: false

  - id: alignment_chip_filename
    tier: 2
    scope: filename
    when:
      extensions: [".bam", ".cram", ".sam", ".sam.gz"]
      filename_pattern: "(?i)chip|_ChIP_|chipseq"
    then:
      data_modality: epigenomic.histone_modification
      data_type: alignments
      assay_type: ChIP-seq
    confidence: 0.80
    rationale: "Filename contains ChIP-seq indicator"
    terminal: false

  - id: alignment_wgs_filename
    tier: 2
    scope: filename
    when:
      extensions: [".bam", ".cram", ".sam", ".sam.gz"]
      filename_pattern: "(?i)_wgs_|_WGS\\.|whole.?genome"
    then:
      data_modality: genomic
      data_type: alignments
      assay_type: WGS
    confidence: 0.85
    rationale: "Filename contains WGS indicator"
    terminal: false

  - id: alignment_wes_filename
    tier: 2
    scope: filename
    when:
      extensions: [".bam", ".cram", ".sam", ".sam.gz"]
      filename_pattern: "(?i)_wes_|exome|_WES\\."
    then:
      data_modality: genomic
      data_type: alignments
      assay_type: WES
    confidence: 0.85
    rationale: "Filename contains exome indicator"
    terminal: false

  - id: alignment_hifi_filename
    tier: 2
    scope: filename
    when:
      extensions: [".bam", ".cram", ".sam", ".sam.gz"]
      filename_pattern: "(?i)hifi|\\.hifi_reads\\.|pacbio|_pb_"
    then:
      data_modality: genomic
      data_type: alignments
      assay_type: WGS
      platform: PACBIO
    confidence: 0.70
    rationale: "HiFi/PacBio reads typically used for genome assembly"
    terminal: false

  - id: alignment_star_aligner
    tier: 2
    scope: filename
    when:
      extensions: [".bam", ".cram", ".sam", ".sam.gz"]
      filename_pattern: "(?i)Aligned\\.sortedByCoord|_STAR_|\\.star\\."
    then:
      data_modality: transcriptomic.bulk
      data_type: alignments
      assay_type: RNA-seq
    confidence: 0.90
    rationale: "STAR aligner output indicates RNA-seq"
    terminal: false

  # ---------------------------------------------------------------------------
  # Reference assembly in filename
  # ---------------------------------------------------------------------------
  - id: filename_ref_grch38
    tier: 2
    scope: filename
    when:
      filename_pattern: "(?i)hg38|grch38|hs38"
    then:
      reference_assembly: GRCh38
    confidence: 0.90
    rationale: "Filename contains GRCh38/hg38 reference indicator"
    terminal: false

  - id: filename_ref_grch37
    tier: 2
    scope: filename
    when:
      filename_pattern: "(?i)hg19|grch37|hs37|b37"
    then:
      reference_assembly: GRCh37
    confidence: 0.90
    rationale: "Filename contains GRCh37/hg19 reference indicator"
    terminal: false

  - id: filename_ref_chm13
    tier: 2
    scope: filename
    when:
      filename_pattern: "(?i)chm13|t2t|CHM13v2|hs1"
    then:
      reference_assembly: CHM13
    confidence: 0.90
    rationale: "Filename contains CHM13/T2T reference indicator"
    terminal: false

  # ---------------------------------------------------------------------------
  # Dataset-based reference rules (run early to set reference before terminal rules)
  # ---------------------------------------------------------------------------
  # dataset_t2t_reference was removed — replaced by coordinate-based detection
  # in fetch_bed_headers.py which reads actual BED file content from S3.
  # The blanket dataset rule misclassified GRCh38 liftover/comparison files
  # in T2T datasets as CHM13.

  - id: dataset_1000g_reference
    tier: 2
    scope: filename
    when:
      dataset_pattern: "ANVIL_1000G_PRIMED_data_model"
    then:
      reference_assembly: GRCh38
    confidence: 0.95
    rationale: "1000 Genomes Project high-coverage data uses GRCh38 reference"
    terminal: false

  # ---------------------------------------------------------------------------
  # FASTQ reads - modality from filename
  # ---------------------------------------------------------------------------
  - id: reads_rna_filename
    tier: 2
    scope: filename
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      filename_pattern: "(?i)_rna_|rnaseq|transcriptome"
    then:
      data_modality: transcriptomic.bulk
      data_type: reads
    confidence: 0.80
    rationale: "Filename contains RNA indicator"
    terminal: false

  - id: reads_scrna_filename
    tier: 2
    scope: filename
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      filename_pattern: "(?i)scrna|single.?cell|10x"
    then:
      data_modality: transcriptomic.single_cell
      data_type: reads
    confidence: 0.85
    rationale: "Filename contains single-cell indicator"
    terminal: false

  - id: reads_atac_filename
    tier: 2
    scope: filename
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      filename_pattern: "(?i)atac"
    then:
      data_modality: epigenomic.chromatin_accessibility
      data_type: reads
      assay_type: ATAC-seq
    confidence: 0.85
    rationale: "Filename contains ATAC indicator"
    terminal: false

  - id: reads_wgs_filename
    tier: 2
    scope: filename
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      filename_pattern: "(?i)_wgs_|whole.?genome"
    then:
      data_modality: genomic
      data_type: reads
      assay_type: WGS
    confidence: 0.80
    rationale: "Filename contains WGS indicator"
    terminal: false

  # ---------------------------------------------------------------------------
  # FASTA assembly indicators
  # ---------------------------------------------------------------------------
  - id: fasta_assembly_filename
    tier: 2
    scope: filename
    when:
      extensions: [".fasta", ".fa", ".fasta.gz", ".fa.gz"]
      filename_pattern: "(?i)(assembly|hifiasm|verkko|flye|canu|wtdbg|hap[12]|diploid|[._](pat|mat)(ernal)?[._])"
    then:
      data_modality: genomic
      data_type: assembly
      reference_assembly: not_applicable
    confidence: 0.80
    rationale: "Filename contains assembly/assembler indicator — de novo assembly"
    terminal: false

  - id: fasta_haplotype_filename
    tier: 2
    scope: filename
    when:
      extensions: [".fasta", ".fa", ".fasta.gz", ".fa.gz"]
      filename_pattern: "(?i)(haplotype|phased|hapdup|purge_dups)"
    then:
      data_modality: genomic
      data_type: assembly
      reference_assembly: not_applicable
    confidence: 0.80
    rationale: "Filename contains haplotype/phasing indicator — de novo assembly"
    terminal: false

  # ---------------------------------------------------------------------------
  # Single-cell matrix - ATAC variant
  # ---------------------------------------------------------------------------
  - id: sc_matrix_atac
    tier: 2
    scope: filename
    when:
      extensions: [".h5ad", ".loom", ".mtx", ".mtx.gz"]
      filename_pattern: "(?i)atac|peaks"
    then:
      data_modality: epigenomic.chromatin_accessibility
      data_type: expression_matrix
      assay_type: ATAC-seq
    confidence: 0.85
    rationale: "Single-cell matrix with ATAC indicator"
    terminal: true

  # ---------------------------------------------------------------------------
  # Nanopore - direct RNA
  # ---------------------------------------------------------------------------
  - id: nanopore_rna_filename
    tier: 2
    scope: filename
    when:
      extensions: [".fast5", ".pod5", ".fast5.tar", ".fast5.tar.gz"]
      filename_pattern: "(?i)rna|direct.?rna"
    then:
      data_modality: transcriptomic.bulk
      data_type: raw_signal
      platform: ONT
    confidence: 0.80
    rationale: "Nanopore direct RNA sequencing"
    terminal: true

  # ---------------------------------------------------------------------------
  # BED file classification rules (from classify_bed_files.py)
  # ---------------------------------------------------------------------------
  - id: bed_methylation
    tier: 2
    scope: filename
    when:
      extensions: [".bed", ".bed.gz"]
      filename_pattern: "(?i)(modbam2bed|cpg|methylat|bisulfite|wgbs)"
    then:
      data_modality: epigenomic.methylation
      data_type: annotations
      assay_type: Bisulfite-seq
    confidence: 0.90
    rationale: "BED file contains CpG methylation calls or bisulfite sequencing regions"
    terminal: true

  - id: bed_expression
    tier: 2
    scope: filename
    when:
      extensions: [".bed", ".bed.gz"]
      filename_pattern: "(?i)(TMM|TPM|RPKM|FPKM|counts|expression|leafcutter|\\.TSS\\.)"
    then:
      data_modality: transcriptomic.bulk
      data_type: annotations
      assay_type: RNA-seq
    confidence: 0.90
    rationale: "BED file contains gene expression quantification or splicing data"
    terminal: true

  - id: bed_atac_peaks
    tier: 2
    scope: filename
    when:
      extensions: [".bed", ".bed.gz"]
      filename_pattern: "(?i)(\\.atac\\.|atac[-_]?seq|atacseq)"
    then:
      data_modality: epigenomic.chromatin_accessibility
      data_type: peaks
      assay_type: ATAC-seq
    confidence: 0.90
    rationale: "BED file contains ATAC-seq peak calls for chromatin accessibility"
    terminal: true

  - id: bed_chip_peaks
    tier: 2
    scope: filename
    when:
      extensions: [".bed", ".bed.gz"]
      filename_pattern: "(?i)(\\.chip\\.|chip[-_]?seq|chipseq|histone|h3k\\d+)"
    then:
      data_modality: epigenomic.histone_modification
      data_type: peaks
      assay_type: ChIP-seq
    confidence: 0.90
