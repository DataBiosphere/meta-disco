# Meta-Disco Unified Classification Rules
# ========================================
#
# This file consolidates all classification rules from:
# 1. rules/classification_rules.yaml (extension, filename rules)
# 2. src/meta_disco/header_classifier.py (header rules)
# 3. scripts/classify_bed_files.py (BED file patterns)
# 4. scripts/classify_images.py (image extensions)
# 5. scripts/classify_auxiliary_genomic.py (FAST5/POD5/PLINK)
#
# Rule Schema:
# ------------
# - id: unique rule identifier
# - tier: 1=extension, 2=filename, 3=header
# - scope: extension|filename|header|vcf_header|fastq_header|file_size
# - when: conditions that must all match
# - then: effects to apply when rule matches
# - confidence: 0.0-1.0 confidence score
# - rationale: explanation for this classification
# - terminal: if true, stop processing after this rule matches
#
# Condition types (in 'when'):
# - extensions: list of file extensions to match
# - filename_pattern: regex pattern for filename
# - dataset_pattern: regex pattern for dataset title
# - file_size_min_gb: minimum file size in GB
# - file_size_max_gb: maximum file size in GB
# - modality_not_set: true if modality must be unset
# - reference_not_set: true if reference must be unset
# - always: true to always match
# - header_section: BAM header section (@HD, @RG, @PG, @SQ)
# - header_field: field within section (PL, PN, SN, AS, DS)
# - header_pattern: regex pattern to match in field
# - vcf_header_type: VCF header line type (##reference, ##source, ##contig, ##INFO, ##FORMAT)
# - vcf_pattern: regex pattern for VCF header
# - fastq_pattern: regex pattern for FASTQ read name
# - platform: required platform (ILLUMINA, PACBIO, ONT)
# - file_format: required format (.bam, .cram, etc)
#
# Effect types (in 'then'):
# - data_modality: set data modality
# - data_type: set data type (alignments, variants, etc)
# - reference_assembly: set reference (GRCh38, GRCh37, CHM13)
# - assay_type: set assay type (WGS, WES, RNA-seq, etc)
# - platform: set platform
# - skip: true to mark file for skipping
# - needs_header_inspection: true to flag for header analysis
# - needs_study_context: true to flag for study context
# - needs_manual_review: true to flag for manual review
# - file_category: set file category (qc_stats, reference_intervals, etc)

# =============================================================================
# EXTENSION MAP
# =============================================================================
# Maps file extensions to file type categories for rule chain selection

extension_map:
  # Alignments
  ".bam": alignment
  ".cram": alignment
  ".sam": alignment
  ".sam.gz": alignment

  # Variants
  ".vcf": variant
  ".vcf.gz": variant
  ".bcf": variant
  ".gvcf": variant
  ".gvcf.gz": variant
  ".g.vcf.gz": variant

  # Sequencing reads
  ".fastq": reads
  ".fq": reads
  ".fastq.gz": reads
  ".fq.gz": reads

  # Genomic intervals/regions
  ".bed": intervals
  ".bed.gz": intervals
  ".narrowpeak": intervals
  ".broadpeak": intervals

  # Signal tracks
  ".bigwig": signal
  ".bw": signal
  ".bigWig": signal
  ".bedGraph": signal

  # Indices (skip - inherit from parent)
  ".bai": index
  ".crai": index
  ".tbi": index
  ".csi": index
  ".fai": index
  ".idx": index
  ".pbi": index

  # Checksums (skip)
  ".md5": checksum

  # Genotyping (PLINK)
  ".pgen": genotype_plink
  ".pvar": genotype_plink
  ".psam": genotype_plink

  # Single-cell matrices
  ".h5ad": single_cell_matrix
  ".loom": single_cell_matrix
  ".mtx": single_cell_matrix
  ".mtx.gz": single_cell_matrix

  # Methylation arrays
  ".idat": methylation_array

  # Nanopore raw signal
  ".fast5": nanopore
  ".pod5": nanopore
  ".fast5.tar": nanopore
  ".fast5.tar.gz": nanopore

  # Images
  ".svs": histology_image
  ".tiff": image
  ".tif": image
  ".png": image
  ".jpg": image

  # Archives (need special handling)
  ".tar": archive
  ".tar.gz": archive
  ".zip": archive

  # Text/tabular (ambiguous)
  ".txt": text_ambiguous
  ".tsv": text_ambiguous
  ".csv": text_ambiguous
  ".log": log_file

---
# =============================================================================
# UNIFIED RULES
# =============================================================================

rules:

  # ===========================================================================
  # TIER 1: EXTENSION-BASED RULES
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Index files - skip classification
  # ---------------------------------------------------------------------------
  - id: index_skip
    tier: 1
    scope: extension
    when:
      extensions: [".bai", ".crai", ".tbi", ".csi", ".fai", ".idx", ".pbi"]
    then:
      skip: true
    confidence: 1.0
    rationale: "Index file - inherits classification from parent data file"
    terminal: true

  # ---------------------------------------------------------------------------
  # Checksum files - skip classification
  # ---------------------------------------------------------------------------
  - id: checksum_skip
    tier: 1
    scope: extension
    when:
      extensions: [".md5"]
    then:
      skip: true
    confidence: 1.0
    rationale: "Checksum file - not data"
    terminal: true

  # ---------------------------------------------------------------------------
  # Log files - skip classification
  # ---------------------------------------------------------------------------
  - id: log_skip
    tier: 1
    scope: extension
    when:
      extensions: [".log"]
    then:
      skip: true
    confidence: 1.0
    rationale: "Log file - not data"
    terminal: true

  # ---------------------------------------------------------------------------
  # VCF files - genomic by default
  # ---------------------------------------------------------------------------
  - id: variant_default_genomic
    tier: 1
    scope: extension
    when:
      extensions: [".vcf", ".vcf.gz", ".bcf", ".gvcf", ".gvcf.gz", ".g.vcf.gz"]
    then:
      data_modality: genomic
      data_type: variants
    confidence: 0.85
    rationale: "VCF files contain variant calls (genomic data)"
    terminal: false

  # ---------------------------------------------------------------------------
  # PLINK genotype files
  # ---------------------------------------------------------------------------
  - id: plink_genomic
    tier: 1
    scope: extension
    when:
      extensions: [".pgen", ".pvar", ".psam"]
    then:
      data_modality: genomic
      data_type: genotypes
    confidence: 0.95
    rationale: "PLINK files contain genotype data (genomic)"
    terminal: false

  # ---------------------------------------------------------------------------
  # Methylation array files
  # ---------------------------------------------------------------------------
  - id: idat_methylation
    tier: 1
    scope: extension
    when:
      extensions: [".idat"]
    then:
      data_modality: epigenomic.methylation
      data_type: array_signal
      assay_type: Methylation array
    confidence: 0.95
    rationale: "IDAT files are Illumina methylation array data"
    terminal: true

  # ---------------------------------------------------------------------------
  # Single-cell matrix files
  # ---------------------------------------------------------------------------
  - id: sc_matrix_default
    tier: 1
    scope: extension
    when:
      extensions: [".h5ad", ".loom", ".mtx", ".mtx.gz"]
    then:
      data_modality: transcriptomic.single_cell
      data_type: expression_matrix
    confidence: 0.90
    rationale: "Single-cell matrix format indicates scRNA-seq"
    terminal: false

  # ---------------------------------------------------------------------------
  # Histology images (SVS)
  # ---------------------------------------------------------------------------
  - id: image_svs_histology
    tier: 1
    scope: extension
    when:
      extensions: [".svs"]
    then:
      data_modality: imaging.histology
      data_type: images
      assay_type: Histology
    confidence: 0.95
    rationale: "SVS files are Aperio whole-slide histology images used for pathology analysis"
    terminal: true

  # ---------------------------------------------------------------------------
  # PNG images - derived/QC plots
  # ---------------------------------------------------------------------------
  - id: image_png_derived
    tier: 1
    scope: extension
    when:
      extensions: [".png"]
    then:
      data_modality: null
      data_type: images
    confidence: 0.90
    rationale: "PNG files are derived visualizations (QC plots, assembly graphs) - not primary experimental data"
    terminal: false

  # ---------------------------------------------------------------------------
  # Nanopore raw signal files
  # ---------------------------------------------------------------------------
  - id: nanopore_fast5
    tier: 1
    scope: extension
    when:
      extensions: [".fast5", ".fast5.tar", ".fast5.tar.gz"]
    then:
      data_modality: genomic
      data_type: raw_signal
      platform: ONT
      assay_type: WGS
    confidence: 0.90
    rationale: "FAST5 files contain raw Oxford Nanopore electrical signal data. Reference not applicable until basecalling/alignment"
    terminal: false

  - id: nanopore_pod5
    tier: 1
    scope: extension
    when:
      extensions: [".pod5"]
    then:
      data_modality: genomic
      data_type: raw_signal
      platform: ONT
      assay_type: WGS
    confidence: 0.90
    rationale: "POD5 files contain raw Oxford Nanopore electrical signal data (newer format replacing FAST5)"
    terminal: false

  # ===========================================================================
  # TIER 2: FILENAME-BASED RULES
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Alignment files - RNA-seq indicators
  # ---------------------------------------------------------------------------
  - id: alignment_rnaseq_filename
    tier: 2
    scope: filename
    when:
      extensions: [".bam", ".cram", ".sam", ".sam.gz"]
      filename_pattern: "(?i)_rna_|rnaseq|rna-seq|transcriptome|_RNA\\."
    then:
      data_modality: transcriptomic.bulk
      data_type: alignments
    confidence: 0.80
    rationale: "Filename contains RNA-seq indicator"
    terminal: false

  - id: alignment_scrna_filename
    tier: 2
    scope: filename
    when:
      extensions: [".bam", ".cram", ".sam", ".sam.gz"]
      filename_pattern: "(?i)scrna|sc_rna|single.?cell|10x|chromium"
    then:
      data_modality: transcriptomic.single_cell
      data_type: alignments
    confidence: 0.85
    rationale: "Filename contains single-cell RNA indicator"
    terminal: false

  - id: alignment_atac_filename
    tier: 2
    scope: filename
    when:
      extensions: [".bam", ".cram", ".sam", ".sam.gz"]
      filename_pattern: "(?i)atac|_ATAC_"
    then:
      data_modality: epigenomic.chromatin_accessibility
      data_type: alignments
      assay_type: ATAC-seq
    confidence: 0.85
    rationale: "Filename contains ATAC-seq indicator"
    terminal: false

  - id: alignment_chip_filename
    tier: 2
    scope: filename
    when:
      extensions: [".bam", ".cram", ".sam", ".sam.gz"]
      filename_pattern: "(?i)chip|_ChIP_|chipseq"
    then:
      data_modality: epigenomic.histone_modification
      data_type: alignments
      assay_type: ChIP-seq
    confidence: 0.80
    rationale: "Filename contains ChIP-seq indicator"
    terminal: false

  - id: alignment_wgs_filename
    tier: 2
    scope: filename
    when:
      extensions: [".bam", ".cram", ".sam", ".sam.gz"]
      filename_pattern: "(?i)_wgs_|_WGS\\.|whole.?genome"
    then:
      data_modality: genomic
      data_type: alignments
      assay_type: WGS
    confidence: 0.85
    rationale: "Filename contains WGS indicator"
    terminal: false

  - id: alignment_wes_filename
    tier: 2
    scope: filename
    when:
      extensions: [".bam", ".cram", ".sam", ".sam.gz"]
      filename_pattern: "(?i)_wes_|exome|_WES\\."
    then:
      data_modality: genomic
      data_type: alignments
      assay_type: WES
    confidence: 0.85
    rationale: "Filename contains exome indicator"
    terminal: false

  - id: alignment_hifi_filename
    tier: 2
    scope: filename
    when:
      extensions: [".bam", ".cram", ".sam", ".sam.gz"]
      filename_pattern: "(?i)hifi|\\.hifi_reads\\.|pacbio|_pb_"
    then:
      data_modality: genomic
      data_type: alignments
      assay_type: WGS
      platform: PACBIO
    confidence: 0.70
    rationale: "HiFi/PacBio reads typically used for genome assembly"
    terminal: false

  - id: alignment_star_aligner
    tier: 2
    scope: filename
    when:
      extensions: [".bam", ".cram", ".sam", ".sam.gz"]
      filename_pattern: "(?i)Aligned\\.sortedByCoord|_STAR_|\\.star\\."
    then:
      data_modality: transcriptomic.bulk
      data_type: alignments
      assay_type: RNA-seq
    confidence: 0.90
    rationale: "STAR aligner output indicates RNA-seq"
    terminal: false

  # ---------------------------------------------------------------------------
  # Reference assembly in filename
  # ---------------------------------------------------------------------------
  - id: filename_ref_grch38
    tier: 2
    scope: filename
    when:
      filename_pattern: "(?i)hg38|grch38|hs38"
    then:
      reference_assembly: GRCh38
    confidence: 0.90
    rationale: "Filename contains GRCh38/hg38 reference indicator"
    terminal: false

  - id: filename_ref_grch37
    tier: 2
    scope: filename
    when:
      filename_pattern: "(?i)hg19|grch37|hs37|b37"
    then:
      reference_assembly: GRCh37
    confidence: 0.90
    rationale: "Filename contains GRCh37/hg19 reference indicator"
    terminal: false

  - id: filename_ref_chm13
    tier: 2
    scope: filename
    when:
      filename_pattern: "(?i)chm13|t2t|CHM13v2|hs1"
    then:
      reference_assembly: CHM13
    confidence: 0.90
    rationale: "Filename contains CHM13/T2T reference indicator"
    terminal: false

  # ---------------------------------------------------------------------------
  # FASTQ reads - modality from filename
  # ---------------------------------------------------------------------------
  - id: reads_rna_filename
    tier: 2
    scope: filename
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      filename_pattern: "(?i)_rna_|rnaseq|transcriptome"
    then:
      data_modality: transcriptomic.bulk
      data_type: reads
    confidence: 0.80
    rationale: "Filename contains RNA indicator"
    terminal: false

  - id: reads_scrna_filename
    tier: 2
    scope: filename
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      filename_pattern: "(?i)scrna|single.?cell|10x"
    then:
      data_modality: transcriptomic.single_cell
      data_type: reads
    confidence: 0.85
    rationale: "Filename contains single-cell indicator"
    terminal: false

  - id: reads_atac_filename
    tier: 2
    scope: filename
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      filename_pattern: "(?i)atac"
    then:
      data_modality: epigenomic.chromatin_accessibility
      data_type: reads
      assay_type: ATAC-seq
    confidence: 0.85
    rationale: "Filename contains ATAC indicator"
    terminal: false

  - id: reads_wgs_filename
    tier: 2
    scope: filename
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      filename_pattern: "(?i)_wgs_|whole.?genome"
    then:
      data_modality: genomic
      data_type: reads
      assay_type: WGS
    confidence: 0.80
    rationale: "Filename contains WGS indicator"
    terminal: false

  # ---------------------------------------------------------------------------
  # Single-cell matrix - ATAC variant
  # ---------------------------------------------------------------------------
  - id: sc_matrix_atac
    tier: 2
    scope: filename
    when:
      extensions: [".h5ad", ".loom", ".mtx", ".mtx.gz"]
      filename_pattern: "(?i)atac|peaks"
    then:
      data_modality: epigenomic.chromatin_accessibility
      data_type: expression_matrix
      assay_type: ATAC-seq
    confidence: 0.85
    rationale: "Single-cell matrix with ATAC indicator"
    terminal: true

  # ---------------------------------------------------------------------------
  # Nanopore - direct RNA
  # ---------------------------------------------------------------------------
  - id: nanopore_rna_filename
    tier: 2
    scope: filename
    when:
      extensions: [".fast5", ".pod5", ".fast5.tar", ".fast5.tar.gz"]
      filename_pattern: "(?i)rna|direct.?rna"
    then:
      data_modality: transcriptomic.bulk
      data_type: raw_signal
      platform: ONT
    confidence: 0.80
    rationale: "Nanopore direct RNA sequencing"
    terminal: true

  # ---------------------------------------------------------------------------
  # BED file classification rules (from classify_bed_files.py)
  # ---------------------------------------------------------------------------
  - id: bed_methylation
    tier: 2
    scope: filename
    when:
      extensions: [".bed", ".bed.gz"]
      filename_pattern: "(?i)(modbam2bed|cpg|methylat|bisulfite|wgbs)"
    then:
      data_modality: epigenomic.methylation
      data_type: annotations
      assay_type: Bisulfite-seq
    confidence: 0.90
    rationale: "BED file contains CpG methylation calls or bisulfite sequencing regions"
    terminal: true

  - id: bed_expression
    tier: 2
    scope: filename
    when:
      extensions: [".bed", ".bed.gz"]
      filename_pattern: "(?i)(TMM|TPM|RPKM|FPKM|counts|expression|leafcutter|\\.TSS\\.)"
    then:
      data_modality: transcriptomic.bulk
      data_type: annotations
      assay_type: RNA-seq
    confidence: 0.90
    rationale: "BED file contains gene expression quantification or splicing data"
    terminal: true

  - id: bed_atac_peaks
    tier: 2
    scope: filename
    when:
      extensions: [".bed", ".bed.gz"]
      filename_pattern: "(?i)(\\.atac\\.|atac[-_]?seq|atacseq)"
    then:
      data_modality: epigenomic.chromatin_accessibility
      data_type: peaks
      assay_type: ATAC-seq
    confidence: 0.90
    rationale: "BED file contains ATAC-seq peak calls for chromatin accessibility"
    terminal: true

  - id: bed_chip_peaks
    tier: 2
    scope: filename
    when:
      extensions: [".bed", ".bed.gz"]
      filename_pattern: "(?i)(\\.chip\\.|chip[-_]?seq|chipseq|histone|h3k\\d+)"
    then:
      data_modality: epigenomic.chromatin_accessibility
      data_type: peaks
      assay_type: ChIP-seq
    confidence: 0.90
    rationale: "BED file contains ChIP-seq peak calls for histone marks or TF binding"
    terminal: true

  - id: bed_peaks_generic
    tier: 2
    scope: filename
    when:
      extensions: [".bed", ".bed.gz", ".narrowpeak", ".broadpeak"]
      filename_pattern: "(?i)(peak|summit|narrowPeak|broadPeak)"
    then:
      data_modality: epigenomic.chromatin_accessibility
      data_type: peaks
    confidence: 0.85
    rationale: "BED file contains ChIP-seq or ATAC-seq peak calls"
    terminal: false

  - id: bed_assembly_qc
    tier: 2
    scope: filename
    when:
      extensions: [".bed", ".bed.gz"]
      filename_pattern: "(?i)(\\.hap[12]\\.|paternal|maternal|\\.dip\\.bed|\\.switch\\.|flagger|\\.lowQ\\.|unreliable|issues\\.bed|_genbank\\.)"
    then:
      data_modality: null
      data_type: annotations
    confidence: 0.85
    rationale: "BED file is assembly QC output (haplotype regions, error flags) - derived artifact, not primary data"
    terminal: true

  - id: bed_regions
    tier: 2
    scope: filename
    when:
      extensions: [".bed", ".bed.gz"]
      filename_pattern: "\\.regions\\.bed"
    then:
      data_modality: genomic
      data_type: annotations
    confidence: 0.80
    rationale: "BED file contains genomic analysis regions (callable, target, etc.)"
    terminal: true

  # ---------------------------------------------------------------------------
  # Signal track classification
  # ---------------------------------------------------------------------------
  - id: signal_chip
    tier: 2
    scope: filename
    when:
      extensions: [".bigwig", ".bw", ".bigWig", ".bedGraph"]
      filename_pattern: "(?i)chip|h3k|histone"
    then:
      data_modality: epigenomic.histone_modification
      data_type: signal
      assay_type: ChIP-seq
    confidence: 0.85
    rationale: "Signal track with ChIP/histone indicator"
    terminal: true

  - id: signal_atac
    tier: 2
    scope: filename
    when:
      extensions: [".bigwig", ".bw", ".bigWig", ".bedGraph"]
      filename_pattern: "(?i)atac"
    then:
      data_modality: epigenomic.chromatin_accessibility
      data_type: signal
      assay_type: ATAC-seq
    confidence: 0.85
    rationale: "Signal track with ATAC indicator"
    terminal: true

  - id: signal_rnaseq
    tier: 2
    scope: filename
    when:
      extensions: [".bigwig", ".bw", ".bigWig", ".bedGraph"]
      filename_pattern: "(?i)rna|transcriptome|coverage"
    then:
      data_modality: transcriptomic.bulk
      data_type: signal
    confidence: 0.75
    rationale: "Signal track with RNA/coverage indicator"
    terminal: true

  # ---------------------------------------------------------------------------
  # Intervals - target regions
  # ---------------------------------------------------------------------------
  - id: intervals_chip_peaks
    tier: 2
    scope: filename
    when:
      extensions: [".bed", ".bed.gz", ".narrowpeak", ".broadpeak"]
      filename_pattern: "(?i)chip|h3k|histone"
    then:
      data_modality: epigenomic.histone_modification
      data_type: peaks
      assay_type: ChIP-seq
    confidence: 0.90
    rationale: "ChIP-seq histone modification peaks"
    terminal: true

  - id: intervals_targets
    tier: 2
    scope: filename
    when:
      extensions: [".bed", ".bed.gz"]
      filename_pattern: "(?i)targets?|regions?|capture|exome"
    then:
      file_category: reference_intervals
      skip: true
    confidence: 0.85
    rationale: "Target/capture region file - reference data"
    terminal: true

  # ---------------------------------------------------------------------------
  # Text files - QC stats
  # ---------------------------------------------------------------------------
  - id: text_stats
    tier: 2
    scope: filename
    when:
      extensions: [".txt", ".tsv"]
      filename_pattern: "(?i)\\.stats\\.txt$|samtools\\.stats|mosdepth|flagstat"
    then:
      skip: true
      file_category: qc_stats
    confidence: 0.90
    rationale: "QC/stats file - supplementary data"
    terminal: true

  - id: text_counts
    tier: 2
    scope: filename
    when:
      extensions: [".txt", ".tsv", ".csv"]
      filename_pattern: "(?i)counts?\\.txt|expression|tpm\\.txt|fpkm\\.txt"
    then:
      data_modality: transcriptomic.bulk
      data_type: expression_matrix
    confidence: 0.70
    rationale: "Filename suggests expression count data"
    terminal: true

  # ---------------------------------------------------------------------------
  # Images - QC plots
  # ---------------------------------------------------------------------------
  - id: image_qc_plot
    tier: 2
    scope: filename
    when:
      extensions: [".png", ".jpg", ".tiff", ".tif"]
      filename_pattern: "(?i)plot|qc|fastqc|multiqc"
    then:
      skip: true
      file_category: qc_plot
    confidence: 0.85
    rationale: "QC plot - supplementary visualization"
    terminal: true

  - id: image_assembly_plot
    tier: 2
    scope: filename
    when:
      extensions: [".png", ".jpg", ".tiff", ".tif"]
      filename_pattern: "(?i)merqury|assembly|kmer"
    then:
      skip: true
      file_category: assembly_plot
    confidence: 0.80
    rationale: "Assembly QC plot - supplementary visualization"
    terminal: true

  # ---------------------------------------------------------------------------
  # Archive files - T2T specific
  # ---------------------------------------------------------------------------
  - id: archive_t2t_genomic
    tier: 2
    scope: filename
    when:
      extensions: [".tar", ".tar.gz"]
      filename_pattern: "^chr[0-9XY]+\\.[0-9]+_[0-9]+\\.tar$"
      dataset_pattern: "(?i)t2t"
    then:
      data_modality: genomic
      data_type: archive
    confidence: 0.75
    rationale: "T2T project genomic region archive"
    terminal: true

  # ---------------------------------------------------------------------------
  # Dataset-based reference rules
  # ---------------------------------------------------------------------------
  - id: dataset_t2t_reference
    tier: 2
    scope: filename
    when:
      dataset_pattern: "ANVIL_T2T"
    then:
      reference_assembly: CHM13
    confidence: 0.90
    rationale: "T2T consortium data uses CHM13 reference"
    terminal: false

  - id: dataset_1000g_reference
    tier: 2
    scope: filename
    when:
      dataset_pattern: "ANVIL_1000G_PRIMED_data_model"
    then:
      reference_assembly: GRCh38
    confidence: 0.95
    rationale: "1000 Genomes Project high-coverage data uses GRCh38 reference"
    terminal: false

  # ===========================================================================
  # TIER 2.5: FILE SIZE HEURISTICS
  # ===========================================================================

  - id: alignment_size_wgs
    tier: 2
    scope: file_size
    when:
      extensions: [".bam", ".cram"]
      file_size_min_gb: 50
      modality_not_set: true
    then:
      data_modality: genomic
      data_type: alignments
      assay_type: WGS
    confidence: 0.60
    rationale: "Large alignment file (>50GB) suggests WGS"
    terminal: false

  - id: illumina_bam_wgs_large
    tier: 2
    scope: file_size
    when:
      extensions: [".bam"]
      platform: ILLUMINA
      file_size_min_gb: 50
    then:
      assay_type: WGS
    confidence: 0.80
    rationale: "Illumina BAM files >50 GB strongly suggest WGS. At 30x coverage, a human WGS BAM is typically 80-120 GB"
    terminal: false

  - id: illumina_bam_wgs_medium
    tier: 2
    scope: file_size
    when:
      extensions: [".bam"]
      platform: ILLUMINA
      file_size_min_gb: 30
