  # ===========================================================================
  # TIER 3: HEADER-BASED RULES (BAM/CRAM @RG, @PG, @SQ)
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Platform detection from @RG PL field
  # ---------------------------------------------------------------------------
  - id: platform_pacbio
    tier: 3
    scope: header
    when:
      extensions: [".bam", ".cram"]
      header_section: "@RG"
      header_field: "PL"
      header_pattern: "PACBIO"
    then:
      platform: PACBIO
      data_modality: genomic
    confidence: 0.70
    rationale: "PL:PACBIO indicates PacBio long-read sequencing. PacBio is primarily used for whole genome sequencing, structural variant detection, and de novo assembly due to its long read lengths (10-25kb average for HiFi)"
    terminal: false

  - id: platform_illumina
    tier: 3
    scope: header
    when:
      extensions: [".bam", ".cram"]
      header_section: "@RG"
      header_field: "PL"
