    confidence: 0.90
    rationale: "Sniffles is a long-read SV caller optimized for PacBio and ONT data"
    terminal: false

  - id: vcf_pbsv
    tier: 3
    scope: vcf_header
    when:
      extensions: [".vcf", ".vcf.gz", ".bcf"]
      vcf_header_type: "##source"
      vcf_pattern: "(?i)pbsv"
    then:
      data_modality: genomic
      data_type: variants.structural
    confidence: 0.90
    rationale: "PBSV is PacBio's structural variant caller for HiFi and CLR data"
    terminal: false

  - id: vcf_cutesv
    tier: 3
    scope: vcf_header
    when:
      extensions: [".vcf", ".vcf.gz", ".bcf"]
      vcf_header_type: "##source"
      vcf_pattern: "(?i)cutesv"
    then:
      data_modality: genomic
      data_type: variants.structural
    confidence: 0.90
    rationale: "CuteSV is a fast long-read SV caller using clustering of signatures"
    terminal: false

  # ---------------------------------------------------------------------------
  # VCF copy number variant callers
  # ---------------------------------------------------------------------------
  - id: vcf_cnvkit
    tier: 3
    scope: vcf_header
    when:
      extensions: [".vcf", ".vcf.gz", ".bcf"]
      vcf_header_type: "##source"
      vcf_pattern: "(?i)cnvkit"
    then:
      data_modality: genomic
      data_type: variants.cnv
    confidence: 0.90
    rationale: "CNVkit detects copy number variants from targeted/exome or WGS data"
    terminal: false

  - id: vcf_gatk_cnv
    tier: 3
    scope: vcf_header
    when:
      extensions: [".vcf", ".vcf.gz", ".bcf"]
      vcf_header_type: "##source"
      vcf_pattern: "(?i)gatk.*(cnv|copynumber)|modelsegments"
    then:
      data_modality: genomic
      data_type: variants.cnv
    confidence: 0.90
    rationale: "GATK CNV tools (ModelSegments, etc.) call copy number variants from read depth data"
    terminal: false

  - id: vcf_canvas
    tier: 3
    scope: vcf_header
    when:
      extensions: [".vcf", ".vcf.gz", ".bcf"]
      vcf_header_type: "##source"
      vcf_pattern: "(?i)canvas"
    then:
      data_modality: genomic
      data_type: variants.cnv
    confidence: 0.90
    rationale: "Canvas is Illumina's CNV caller for WGS and tumor-normal analysis"
    terminal: false

  # ---------------------------------------------------------------------------
  # VCF INFO field indicators
  # ---------------------------------------------------------------------------
  - id: vcf_info_somatic
    tier: 3
    scope: vcf_header
    when:
      extensions: [".vcf", ".vcf.gz", ".bcf", ".gvcf", ".gvcf.gz", ".g.vcf.gz"]
      vcf_header_type: "##INFO"
      vcf_pattern: "ID=(SOMATIC|TUMOR_|NORMAL_|TumorVAF|NormalVAF)"
    then:
      data_type: variants.somatic
    confidence: 0.85
    rationale: "INFO fields with SOMATIC, TUMOR_, or NORMAL_ prefixes indicate somatic variant calls"
    terminal: false

  - id: vcf_info_sv
    tier: 3
    scope: vcf_header
    when:
      extensions: [".vcf", ".vcf.gz", ".bcf"]
      vcf_header_type: "##INFO"
      vcf_pattern: "ID=(SVTYPE|SVLEN|END|CIPOS|CIEND|MATEID|IMPRECISE)"
    then:
      data_type: variants.structural
    confidence: 0.80
    rationale: "Standard SV INFO fields (SVTYPE, SVLEN, CIPOS, etc.) indicate structural variant calls"
    terminal: false

  - id: vcf_info_cnv
    tier: 3
    scope: vcf_header
    when:
      extensions: [".vcf", ".vcf.gz", ".bcf"]
      vcf_header_type: "##INFO"
      vcf_pattern: "ID=(CN|FOLD_CHANGE|PROBES|LOG2_COPY_RATIO)"
    then:
      data_type: variants.cnv
    confidence: 0.80
    rationale: "CNV-specific INFO fields indicate copy number variant calls"
    terminal: false

  # ===========================================================================
  # TIER 3: FASTQ HEADER RULES
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Illumina read name patterns
  # ---------------------------------------------------------------------------
  - id: fastq_illumina_modern
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@[A-Z0-9-]+:\\d+:[A-Z0-9]+:\\d+:\\d+:\\d+:\\d+"
    then:
      platform: ILLUMINA
    confidence: 0.90
    rationale: "Modern Illumina read names (Casava 1.8+) follow the format @instrument:run:flowcell:lane:tile:x:y"
    terminal: false

  - id: fastq_illumina_legacy
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@[A-Z0-9-]+:\\d+:\\d+:\\d+:\\d+#"
    then:
      platform: ILLUMINA
    confidence: 0.85
    rationale: "Legacy Illumina read names follow @instrument:lane:tile:x:y#index format"
    terminal: false

  - id: fastq_illumina_srr
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@SRR\\d+\\.\\d+"
    then:
      platform: ILLUMINA
    confidence: 0.70
    rationale: "SRA-reformatted read names starting with @SRR typically indicate Illumina data from NCBI SRA"
    terminal: false

  - id: fastq_illumina_hiseq_desc
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: " HS2[05]00[-_]"
    then:
      platform: ILLUMINA
    confidence: 0.85
    rationale: "HiSeq 2000/2500 instrument identifier found in read description"
    terminal: false

  # ---------------------------------------------------------------------------
  # PacBio read name patterns
  # ---------------------------------------------------------------------------
  - id: fastq_pacbio_ccs
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@m\\d+[A-Za-z]*_\\d+_\\d+/\\d+/ccs"
    then:
      platform: PACBIO
      data_modality: genomic
      assay_type: WGS
    confidence: 0.95
    rationale: "PacBio CCS (HiFi) read names follow @movie/zmw/ccs format. The 'ccs' suffix indicates high-accuracy long reads (>Q20)"
    terminal: false

  - id: fastq_pacbio_clr
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@m\\d+[A-Za-z]*_\\d+_\\d+/\\d+/\\d+_\\d+"
    then:
      platform: PACBIO
      data_modality: genomic
    confidence: 0.90
    rationale: "PacBio CLR (Continuous Long Read) subread names follow @movie/zmw/start_end format"
    terminal: false

  - id: fastq_pacbio_generic
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@m\\d+[A-Za-z]*_\\d+_\\d+/\\d+"
    then:
      platform: PACBIO
      data_modality: genomic
    confidence: 0.85
    rationale: "Generic PacBio read names follow @movie/zmw format"
    terminal: false

  # ---------------------------------------------------------------------------
  # ONT read name patterns
  # ---------------------------------------------------------------------------
  - id: fastq_ont_uuid
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    then:
      platform: ONT
      data_modality: genomic
    confidence: 0.95
    rationale: "ONT read names are UUIDs (format: 8-4-4-4-12 hex characters). Uniquely identifies Oxford Nanopore data"
    terminal: false

  - id: fastq_ont_metadata
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "runid=[a-f0-9]+"
    then:
      platform: ONT
      data_modality: genomic
    confidence: 0.95
    rationale: "ONT reads often include 'runid=' metadata in the header line"
    terminal: false

  # ---------------------------------------------------------------------------
  # MGI/BGI read name patterns
  # ---------------------------------------------------------------------------
  - id: fastq_mgi
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@[A-Z]\\d{9}L\\dC\\d{3}R\\d{3}\\d+"
    then:
      platform: MGI
    confidence: 0.90
    rationale: "MGI/BGI-SEQ read names follow @flowcellLaneCcolumnRrow format"
    terminal: false

  - id: fastq_mgi_alt
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@[A-Z]\\d+L\\d+C\\d+R\\d+"
    then:
      platform: MGI
    confidence: 0.85
    rationale: "Alternative MGI/BGI read name format with varying digit lengths"
    terminal: false

  # ---------------------------------------------------------------------------
  # Element Biosciences patterns
  # ---------------------------------------------------------------------------
  - id: fastq_element
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@[A-Z0-9]+:[A-Z0-9]+:\\d+:\\d+:\\d+:\\d+:\\d+"
    then:
      platform: ELEMENT
    confidence: 0.80
    rationale: "Element Biosciences AVITI read names follow a similar format to Illumina"
    terminal: false

  # ---------------------------------------------------------------------------
  # Ultima Genomics patterns
  # ---------------------------------------------------------------------------
  - id: fastq_ultima
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@[A-Z0-9]+_\\d+_\\d+_\\d+_[ACGT]+"
    then:
      platform: ULTIMA
    confidence: 0.80
    rationale: "Ultima Genomics read names include flow-space encoded sequences"
    terminal: false

  # ---------------------------------------------------------------------------
  # Archive accession patterns (ENA/SRA)
  # ---------------------------------------------------------------------------
  - id: fastq_ena_err
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@ERR\\d+\\.\\d+"
    then: {}
    confidence: 0.60
    rationale: "ERR accessions indicate data from the European Nucleotide Archive (ENA)"
    terminal: false

  - id: fastq_sra_srr
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@SRR\\d+\\.\\d+"
    then: {}
    confidence: 0.60
    rationale: "SRR accessions indicate data from NCBI Sequence Read Archive (SRA)"
    terminal: false

  - id: fastq_ddbj_drr
    tier: 3
    scope: fastq_header
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      fastq_pattern: "^@DRR\\d+\\.\\d+"
    then: {}
    confidence: 0.60
    rationale: "DRR accessions indicate data from DDBJ Sequence Read Archive (Japan)"
    terminal: false

  # ===========================================================================
  # FALLBACK RULES
  # ===========================================================================

  - id: alignment_fallback
    tier: 2
    scope: filename
    when:
      extensions: [".bam", ".cram", ".sam", ".sam.gz"]
      modality_not_set: true
    then:
      needs_header_inspection: true
    confidence: 0.0
    rationale: "No modality indicators found; requires BAM header inspection"
    terminal: true

  - id: variant_needs_header
    tier: 2
    scope: filename
    when:
      extensions: [".vcf", ".vcf.gz", ".bcf", ".gvcf", ".gvcf.gz", ".g.vcf.gz"]
      reference_not_set: true
    then:
      needs_header_inspection: true
    confidence: 0.0
    rationale: "Reference assembly not in filename; check VCF header"
    terminal: true

  - id: reads_fallback
    tier: 2
    scope: filename
    when:
      extensions: [".fastq", ".fq", ".fastq.gz", ".fq.gz"]
      modality_not_set: true
    then:
      needs_study_context: true
    confidence: 0.0
    rationale: "FASTQ modality ambiguous; requires study context"
    terminal: true

  - id: signal_fallback
    tier: 2
    scope: filename
    when:
      extensions: [".bigwig", ".bw", ".bigWig", ".bedGraph"]
      modality_not_set: true
    then:
      needs_study_context: true
    confidence: 0.0
    rationale: "Signal track modality unclear - needs study context"
    terminal: true

  - id: intervals_fallback
    tier: 2
    scope: filename
    when:
      extensions: [".bed", ".bed.gz", ".narrowpeak", ".broadpeak"]
      modality_not_set: true
    then:
      data_modality: genomic
      data_type: annotations
      needs_study_context: true
    confidence: 0.60
    rationale: "BED file with no specific pattern - defaulting to genomic intervals"
    terminal: true

  - id: archive_fallback
    tier: 2
    scope: filename
    when:
      extensions: [".tar", ".tar.gz", ".zip"]
      modality_not_set: true
    then:
      needs_manual_review: true
    confidence: 0.0
    rationale: "Archive contents unknown - needs inspection"
    terminal: true

  - id: image_fallback
    tier: 2
    scope: filename
    when:
      extensions: [".png", ".jpg", ".tiff", ".tif"]
      modality_not_set: true
    then:
      needs_manual_review: true
    confidence: 0.0
    rationale: "Image purpose unclear"
    terminal: true

  - id: text_fallback
    tier: 2
    scope: filename
    when:
      extensions: [".txt", ".tsv", ".csv"]
      modality_not_set: true
    then:
      needs_manual_review: true
    confidence: 0.0
    rationale: "Ambiguous text file - requires manual review"
    terminal: true

---
# =============================================================================
# VALIDATOR CONFIGURATIONS
# =============================================================================
# Complex matching logic that requires Python code

validators:
  contig_length_detector:
    description: "Detect reference assembly from chromosome lengths in @SQ or ##contig lines"
    module: "meta_disco.validators.contig_lengths"
    function: "detect_reference_from_contig_lengths"
    applies_to: ["header", "vcf_header"]
    confidence: 0.98

  max_position_detector:
    description: "Detect reference assembly by ruling out references where variant positions exceed chromosome lengths"
    module: "meta_disco.validators.contig_lengths"
    function: "detect_reference_from_max_positions"
    applies_to: ["vcf_header"]
    confidence: 0.90

  illumina_read_parser:
    description: "Parse Illumina read names to extract instrument, flowcell, lane"
    module: "meta_disco.validators.read_name_parsers"
    function: "parse_illumina_read_name"
    applies_to: ["fastq_header"]

  pacbio_read_parser:
    description: "Parse PacBio read names to extract movie, ZMW, read type"
    module: "meta_disco.validators.read_name_parsers"
    function: "parse_pacbio_read_name"
    applies_to: ["fastq_header"]

  ont_read_parser:
    description: "Parse ONT read names to extract UUID and metadata"
    module: "meta_disco.validators.read_name_parsers"
    function: "parse_ont_read_name"
    applies_to: ["fastq_header"]

  illumina_instrument_model:
    description: "Infer Illumina instrument model from instrument ID prefix"
    module: "meta_disco.validators.read_name_parsers"
    function: "infer_illumina_instrument_model"
    applies_to: ["header", "fastq_header"]

---
# =============================================================================
# ASSAY TYPE INFERENCE RULES
# =============================================================================
# Priority-ordered rules for inferring assay type from other signals

assay_type_rules:
  - id: rnaseq_program
    priority: 100
    conditions:
      matched_rules_any:
        - program_star
        - program_hisat2
        - program_tophat
        - program_salmon
        - program_kallisto
        - program_isoseq
    assay_type: RNA-seq

  - id: rnaseq_modality
    priority: 95
    conditions:
      data_modality_contains: transcriptomic
    assay_type: RNA-seq

  - id: wgs_longread
    priority: 80
    conditions:
      platform_in: [PACBIO, ONT]
    assay_type: WGS

  - id: wgs_illumina_bam_large
    priority: 50
    conditions:
      platform: ILLUMINA
      file_format_not: ".cram"
      file_size_gb_gt: 50
    assay_type: WGS

  - id: wes_illumina_bam_small
    priority: 50
    conditions:
      platform: ILLUMINA
      file_format_not: ".cram"
      file_size_gb_lt: 20
    assay_type: WES

  - id: wgs_illumina_cram_large
    priority: 50
    conditions:
      platform: ILLUMINA
      file_format: ".cram"
      file_size_gb_gt: 20
    assay_type: WGS

  - id: wes_illumina_cram_small
    priority: 50
    conditions:
      platform: ILLUMINA
      file_format: ".cram"
      file_size_gb_lt: 8
    assay_type: WES

---
# =============================================================================
# ILLUMINA INSTRUMENT ID PREFIX MAPPING
# =============================================================================

illumina_instruments:
  - prefix: "A0"
    model: "NovaSeq 6000"
  - prefix: "A1"
    model: "NovaSeq 6000"
  - prefix: "A"
    model: "NovaSeq"
  - prefix: "M"
    model: "MiSeq"
  - prefix: "D"
    model: "HiSeq 2500"
  - prefix: "E"
    model: "HiSeq X"
  - prefix: "VH"
    model: "NextSeq 2000"
  - prefix: "N"
    model: "NextSeq"
  - prefix: "K"
    model: "HiSeq 4000"
  - prefix: "J"
    model: "HiSeq 3000"

