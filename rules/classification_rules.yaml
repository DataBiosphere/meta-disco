# Meta-Disco Classification Rules
# Organized as chains by file type
#
# Structure:
#   extension_map: maps extensions to file_type
#   file_types: defines the rule chain for each type
#
# Each rule in a chain:
#   - Runs in order until a terminal rule matches
#   - Can set modality, reference, or both
#   - Contributes to confidence (additive within chain)
#   - Adds to reason chain for explainability

extension_map:
  # Alignments
  ".bam": alignment
  ".cram": alignment
  ".sam": alignment
  ".sam.gz": alignment

  # Variants
  ".vcf": variant
  ".vcf.gz": variant
  ".bcf": variant
  ".gvcf": variant
  ".gvcf.gz": variant
  ".g.vcf.gz": variant

  # Sequencing reads
  ".fastq": reads
  ".fq": reads
  ".fastq.gz": reads
  ".fq.gz": reads

  # Genomic intervals/regions
  ".bed": intervals
  ".bed.gz": intervals
  ".narrowpeak": intervals
  ".broadpeak": intervals

  # Signal tracks
  ".bigwig": signal
  ".bw": signal
  ".bigWig": signal
  ".bedGraph": signal

  # Indices (skip - inherit from parent)
  ".bai": index
  ".crai": index
  ".tbi": index
  ".csi": index
  ".fai": index
  ".idx": index
  ".pbi": index

  # Checksums (skip)
  ".md5": checksum

  # Genotyping (PLINK)
  ".pgen": genotype_plink
  ".pvar": genotype_plink
  ".psam": genotype_plink

  # Single-cell matrices
  ".h5ad": single_cell_matrix
  ".loom": single_cell_matrix
  ".mtx": single_cell_matrix
  ".mtx.gz": single_cell_matrix

  # Methylation arrays
  ".idat": methylation_array

  # Nanopore
  ".fast5": nanopore
  ".pod5": nanopore

  # Images
  ".svs": histology_image
  ".tiff": image
  ".tif": image
  ".png": image
  ".jpg": image

  # Archives (need special handling)
  ".tar": archive
  ".tar.gz": archive
  ".zip": archive

  # Text/tabular (ambiguous)
  ".txt": text_ambiguous
  ".tsv": text_ambiguous
  ".csv": text_ambiguous
  ".log": log_file

---
file_types:

  # ============================================================
  # ALIGNMENT FILES (.bam, .cram, .sam)
  # ============================================================
  alignment:
    description: "Sequence alignment files"
    default_modality: null  # ambiguous - could be genomic or transcriptomic
    chain:
      # Rule 1: Check for RNA-seq indicators in filename
      - id: alignment_rnaseq_filename
        when:
          filename_matches:
            - "(?i)_rna_"
            - "(?i)rnaseq"
            - "(?i)rna-seq"
            - "(?i)transcriptome"
            - "(?i)_RNA\\."
        then:
          data_modality: transcriptomic.bulk
        confidence: 0.80
        reason: "Filename contains RNA-seq indicator"
        terminal: false  # continue to check for single-cell

      # Rule 2: Check for single-cell RNA indicators
      - id: alignment_scrna_filename
        when:
          filename_matches:
            - "(?i)scrna"
            - "(?i)sc_rna"
            - "(?i)single.?cell"
            - "(?i)10x"
            - "(?i)chromium"
        then:
          data_modality: transcriptomic.single_cell
        confidence: 0.85
        reason: "Filename contains single-cell RNA indicator"
        terminal: false

      # Rule 3: Check for ATAC-seq indicators
      - id: alignment_atac_filename
        when:
          filename_matches:
            - "(?i)atac"
            - "(?i)_ATAC_"
        then:
          data_modality: epigenomic.chromatin_accessibility
        confidence: 0.85
        reason: "Filename contains ATAC-seq indicator"
        terminal: false

      # Rule 4: Check for ChIP-seq indicators
      - id: alignment_chip_filename
        when:
          filename_matches:
            - "(?i)chip"
            - "(?i)_ChIP_"
            - "(?i)chipseq"
        then:
          data_modality: epigenomic.histone_modification
        confidence: 0.80
        reason: "Filename contains ChIP-seq indicator"
        terminal: false

      # Rule 5: Check for WGS indicators
      - id: alignment_wgs_filename
        when:
          filename_matches:
            - "(?i)_wgs_"
            - "(?i)_WGS\\."
            - "(?i)whole.?genome"
        then:
          data_modality: genomic
          assay_type: WGS
        confidence: 0.85
        reason: "Filename contains WGS indicator"
        terminal: false

      # Rule 6: Check for WES/exome indicators
      - id: alignment_wes_filename
        when:
          filename_matches:
            - "(?i)_wes_"
            - "(?i)exome"
            - "(?i)_WES\\."
        then:
          data_modality: genomic
          assay_type: WES
        confidence: 0.85
        reason: "Filename contains exome indicator"
        terminal: false

      # Rule 7: Check for HiFi/PacBio long reads (usually genomic)
      - id: alignment_hifi_filename
        when:
          filename_matches:
            - "(?i)hifi"
            - "(?i)\\.hifi_reads\\."
            - "(?i)pacbio"
            - "(?i)_pb_"
        then:
          data_modality: genomic
          assay_type: WGS
        confidence: 0.70
        reason: "HiFi/PacBio reads typically used for genome assembly"
        terminal: false

      # Rule 8: Check for reference assembly in filename
      - id: alignment_ref_grch38
        when:
          filename_matches:
            - "(?i)hg38"
            - "(?i)grch38"
            - "(?i)hs38"
        then:
          reference_assembly: GRCh38
        confidence: 0.90
        reason: "Filename contains GRCh38/hg38 reference indicator"
        terminal: false

      - id: alignment_ref_grch37
        when:
          filename_matches:
            - "(?i)hg19"
            - "(?i)grch37"
            - "(?i)hs37"
        then:
          reference_assembly: GRCh37
        confidence: 0.90
        reason: "Filename contains GRCh37/hg19 reference indicator"
        terminal: false

      - id: alignment_ref_chm13
        when:
          filename_matches:
            - "(?i)chm13"
            - "(?i)t2t"
            - "(?i)CHM13v2"
        then:
          reference_assembly: CHM13
        confidence: 0.90
        reason: "Filename contains CHM13/T2T reference indicator"
        terminal: false

      # Rule 9: STAR aligner indicates RNA-seq
      - id: alignment_star_aligner
        when:
          filename_matches:
            - "(?i)Aligned\\.sortedByCoord"
            - "(?i)_STAR_"
            - "(?i)\\.star\\."
        then:
          data_modality: transcriptomic.bulk
        confidence: 0.90
        reason: "STAR aligner output indicates RNA-seq"
        terminal: false

      # Rule 10: Size heuristic for WGS vs other
      - id: alignment_size_wgs
        when:
          file_size_gt: 50_000_000_000  # 50GB
          modality_not_set: true
        then:
          data_modality: genomic
          assay_type: WGS
        confidence: 0.60
        reason: "Large alignment file (>50GB) suggests WGS"
        terminal: false

      # Fallback: if no modality set, needs header inspection
      - id: alignment_fallback
        when:
          modality_not_set: true
        then:
          data_modality: null
          needs_header_inspection: true
        confidence: 0.0
        reason: "No modality indicators found; requires BAM header inspection"
        terminal: true

  # ============================================================
  # VARIANT FILES (.vcf, .bcf)
  # ============================================================
  variant:
    description: "Variant call files"
    default_modality: genomic  # variants are inherently genomic
    chain:
      # Rule 1: VCF is genomic by default
      - id: variant_default_genomic
        when:
          always: true
        then:
          data_modality: genomic
        confidence: 0.85
        reason: "VCF files contain variant calls (genomic data)"
        terminal: false

      # Rule 2: Check for reference in filename
      - id: variant_ref_grch38
        when:
          filename_matches:
            - "(?i)hg38"
            - "(?i)grch38"
        then:
          reference_assembly: GRCh38
        confidence: 0.90
        reason: "Filename contains GRCh38/hg38 indicator"
        terminal: false

      - id: variant_ref_grch37
        when:
          filename_matches:
            - "(?i)hg19"
            - "(?i)grch37"
        then:
          reference_assembly: GRCh37
        confidence: 0.90
        reason: "Filename contains GRCh37/hg19 indicator"
        terminal: false

      - id: variant_ref_chm13
        when:
          filename_matches:
            - "(?i)chm13"
            - "(?i)t2t"
        then:
          reference_assembly: CHM13
        confidence: 0.90
        reason: "Filename contains CHM13/T2T indicator"
        terminal: false

      # Rule 3: If no reference found, may need header inspection
      - id: variant_needs_header
        when:
          reference_not_set: true
        then:
          needs_header_inspection: true
        confidence: 0.0
        reason: "Reference assembly not in filename; check VCF header"
        terminal: true

  # ============================================================
  # SEQUENCING READS (.fastq, .fq)
  # ============================================================
  reads:
    description: "Raw sequencing reads"
    default_modality: null  # highly ambiguous without context
    chain:
      # Rule 1: Check for RNA indicators
      - id: reads_rna_filename
        when:
          filename_matches:
            - "(?i)_rna_"
            - "(?i)rnaseq"
            - "(?i)transcriptome"
        then:
          data_modality: transcriptomic.bulk
        confidence: 0.80
        reason: "Filename contains RNA indicator"
        terminal: false

      # Rule 2: Check for single-cell indicators
      - id: reads_scrna_filename
        when:
          filename_matches:
            - "(?i)scrna"
            - "(?i)single.?cell"
            - "(?i)10x"
        then:
          data_modality: transcriptomic.single_cell
        confidence: 0.85
        reason: "Filename contains single-cell indicator"
        terminal: false

      # Rule 3: Check for ATAC indicators
      - id: reads_atac_filename
        when:
          filename_matches:
            - "(?i)atac"
        then:
          data_modality: epigenomic.chromatin_accessibility
        confidence: 0.85
        reason: "Filename contains ATAC indicator"
        terminal: false

      # Rule 4: Check for WGS indicators
      - id: reads_wgs_filename
        when:
          filename_matches:
            - "(?i)_wgs_"
            - "(?i)whole.?genome"
        then:
          data_modality: genomic
          assay_type: WGS
        confidence: 0.80
        reason: "Filename contains WGS indicator"
        terminal: false

      # Rule 5: Illumina paired-end naming (R1/R2) - still ambiguous
      - id: reads_illumina_paired
        when:
          filename_matches:
            - "_R[12]_"
            - "_R[12]\\."
            - "_[12]\\.fastq"
        then:
          sequencing_type: paired_end_illumina
        confidence: 0.0  # doesn't help with modality
        reason: "Illumina paired-end naming detected"
        terminal: false

      # Fallback: needs study context
      - id: reads_fallback
        when:
          modality_not_set: true
        then:
          data_modality: null
          needs_study_context: true
        confidence: 0.0
        reason: "FASTQ modality ambiguous; requires study context"
        terminal: true

  # ============================================================
  # GENOTYPE FILES (PLINK format)
  # ============================================================
  genotype_plink:
    description: "PLINK binary genotype files"
    default_modality: genomic
    chain:
      - id: plink_default
        when:
          always: true
        then:
          data_modality: genomic
        confidence: 0.95
        reason: "PLINK files contain genotype data (genomic)"
        terminal: true

  # ============================================================
  # SINGLE-CELL MATRICES (.h5ad, .loom, .mtx)
  # ============================================================
  single_cell_matrix:
    description: "Single-cell expression matrices"
    default_modality: transcriptomic.single_cell
    chain:
      - id: sc_matrix_default
        when:
          always: true
        then:
          data_modality: transcriptomic.single_cell
        confidence: 0.90
        reason: "Single-cell matrix format indicates scRNA-seq"
        terminal: false

      # Could be ATAC
      - id: sc_matrix_atac
        when:
          filename_matches:
            - "(?i)atac"
            - "(?i)peaks"
        then:
          data_modality: epigenomic.chromatin_accessibility
        confidence: 0.85
        reason: "Single-cell matrix with ATAC indicator"
        terminal: true

  # ============================================================
  # METHYLATION ARRAYS (.idat)
  # ============================================================
  methylation_array:
    description: "Illumina methylation array files"
    default_modality: epigenomic.methylation
    chain:
      - id: idat_default
        when:
          always: true
        then:
          data_modality: epigenomic.methylation
        confidence: 0.95
        reason: "IDAT files are Illumina methylation array data"
        terminal: true

  # ============================================================
  # NANOPORE (.fast5, .pod5)
  # ============================================================
  nanopore:
    description: "Oxford Nanopore signal files"
    default_modality: null
    chain:
      # Nanopore is usually genomic but could be direct RNA
      - id: nanopore_rna
        when:
          filename_matches:
            - "(?i)rna"
            - "(?i)direct.?rna"
        then:
          data_modality: transcriptomic.bulk
        confidence: 0.80
        reason: "Nanopore direct RNA sequencing"
        terminal: true

      - id: nanopore_default_genomic
        when:
          always: true
        then:
          data_modality: genomic
        confidence: 0.70
        reason: "Nanopore typically used for genomic sequencing"
        terminal: true

  # ============================================================
  # HISTOLOGY IMAGES (.svs)
  # ============================================================
  histology_image:
    description: "Whole slide histology images"
    default_modality: imaging
    chain:
      - id: svs_default
        when:
          always: true
        then:
          data_modality: imaging
        confidence: 0.95
        reason: "SVS files are whole-slide histology images"
        terminal: true

  # ============================================================
  # INDEX FILES - SKIP
  # ============================================================
  index:
    description: "Index files - skip classification (inherit from parent)"
    default_modality: null
    chain:
      - id: index_skip
        when:
          always: true
        then:
          skip: true
        confidence: 1.0
        reason: "Index file - inherits classification from parent data file"
        terminal: true

  # ============================================================
  # CHECKSUM FILES - SKIP
  # ============================================================
  checksum:
    description: "Checksum files - skip classification"
    default_modality: null
    chain:
      - id: checksum_skip
        when:
          always: true
        then:
          skip: true
        confidence: 1.0
        reason: "Checksum file - not data"
        terminal: true

  # ============================================================
  # LOG FILES - SKIP
  # ============================================================
  log_file:
    description: "Log files - skip classification"
    default_modality: null
    chain:
      - id: log_skip
        when:
          always: true
        then:
          skip: true
        confidence: 1.0
        reason: "Log file - not data"
        terminal: true

  # ============================================================
  # TEXT/TABULAR FILES - AMBIGUOUS
  # ============================================================
  text_ambiguous:
    description: "Text files - highly ambiguous, needs context"
    default_modality: null
    chain:
      # Stats files - supplementary
      - id: text_stats
        when:
          filename_matches:
            - "(?i)\\.stats\\.txt$"
            - "(?i)samtools\\.stats"
            - "(?i)mosdepth"
            - "(?i)flagstat"
        then:
          skip: true
          file_category: qc_stats
        confidence: 0.90
        reason: "QC/stats file - supplementary data"
        terminal: true

      # Count matrices might be expression data
      - id: text_counts
        when:
          filename_matches:
            - "(?i)counts?\\.txt"
            - "(?i)expression"
            - "(?i)tpm\\.txt"
            - "(?i)fpkm\\.txt"
        then:
          data_modality: transcriptomic.bulk
        confidence: 0.70
        reason: "Filename suggests expression count data"
        terminal: true

      # Fallback - needs manual review
      - id: text_fallback
        when:
          always: true
        then:
          data_modality: null
          needs_manual_review: true
        confidence: 0.0
        reason: "Ambiguous text file - requires manual review"
        terminal: true

  # ============================================================
  # SIGNAL TRACKS (.bigwig, .bw)
  # ============================================================
  signal:
    description: "Genomic signal tracks"
    default_modality: null
    chain:
      # ChIP-seq signal
      - id: signal_chip
        when:
          filename_matches:
            - "(?i)chip"
            - "(?i)h3k"
            - "(?i)histone"
        then:
          data_modality: epigenomic.histone_modification
        confidence: 0.85
        reason: "Signal track with ChIP/histone indicator"
        terminal: true

      # ATAC signal
      - id: signal_atac
        when:
          filename_matches:
            - "(?i)atac"
        then:
          data_modality: epigenomic.chromatin_accessibility
        confidence: 0.85
        reason: "Signal track with ATAC indicator"
        terminal: true

      # RNA-seq coverage
      - id: signal_rnaseq
        when:
          filename_matches:
            - "(?i)rna"
            - "(?i)transcriptome"
            - "(?i)coverage"
        then:
          data_modality: transcriptomic.bulk
        confidence: 0.75
        reason: "Signal track with RNA/coverage indicator"
        terminal: true

      # Fallback
      - id: signal_fallback
        when:
          always: true
        then:
          data_modality: null
          needs_study_context: true
        confidence: 0.0
        reason: "Signal track modality unclear - needs study context"
        terminal: true

  # ============================================================
  # GENOMIC INTERVALS (.bed)
  # ============================================================
  intervals:
    description: "Genomic interval files"
    default_modality: null
    chain:
      # Peak files from ATAC/ChIP - default to chromatin accessibility
      - id: intervals_peaks
        when:
          filename_matches:
            - "(?i)peaks?"
            - "(?i)narrowPeak"
            - "(?i)broadPeak"
            - "(?i)summit"
        then:
          data_modality: epigenomic.chromatin_accessibility
        confidence: 0.85
        reason: "Peak file indicates chromatin accessibility (ATAC-seq/ChIP-seq)"
        terminal: false  # continue to check for ChIP-specific indicators

      # ChIP-seq histone peaks override to histone_modification
      - id: intervals_chip_peaks
        when:
          filename_matches:
            - "(?i)chip"
            - "(?i)h3k"
            - "(?i)histone"
        then:
          data_modality: epigenomic.histone_modification
        confidence: 0.90
        reason: "ChIP-seq histone modification peaks"
        terminal: true

      # Regions/targets
      - id: intervals_targets
        when:
          filename_matches:
            - "(?i)targets?"
            - "(?i)regions?"
            - "(?i)capture"
            - "(?i)exome"
        then:
          file_category: reference_intervals
          skip: true
        confidence: 0.85
        reason: "Target/capture region file - reference data"
        terminal: true

      # Fallback - could be anything
      - id: intervals_fallback
        when:
          always: true
        then:
          data_modality: null
          needs_study_context: true
        confidence: 0.0
        reason: "BED file purpose unclear - needs study context"
        terminal: true

  # ============================================================
  # ARCHIVES (.tar, .tar.gz)
  # ============================================================
  archive:
    description: "Archive files - need content inspection or context"
    default_modality: null
    chain:
      # T2T project tar files with genomic coordinates
      - id: archive_t2t_genomic
        when:
          filename_matches:
            - "^chr[0-9XY]+\\.[0-9]+_[0-9]+\\.tar$"
          dataset_matches:
            - "(?i)t2t"
        then:
          data_modality: genomic
        confidence: 0.75
        reason: "T2T project genomic region archive"
        terminal: true

      # Fallback
      - id: archive_fallback
        when:
          always: true
        then:
          data_modality: null
          needs_manual_review: true
        confidence: 0.0
        reason: "Archive contents unknown - needs inspection"
        terminal: true

  # ============================================================
  # IMAGES (generic)
  # ============================================================
  image:
    description: "Image files - could be plots, microscopy, etc."
    default_modality: null
    chain:
      # QC plots
      - id: image_qc_plot
        when:
          filename_matches:
            - "(?i)plot"
            - "(?i)qc"
            - "(?i)fastqc"
            - "(?i)multiqc"
        then:
          skip: true
          file_category: qc_plot
        confidence: 0.85
        reason: "QC plot - supplementary visualization"
        terminal: true

      # Assembly visualization
      - id: image_assembly
        when:
          filename_matches:
            - "(?i)merqury"
            - "(?i)assembly"
            - "(?i)kmer"
        then:
          skip: true
          file_category: assembly_plot
        confidence: 0.80
        reason: "Assembly QC plot - supplementary visualization"
        terminal: true

      # Fallback
      - id: image_fallback
        when:
          always: true
        then:
          data_modality: null
          needs_manual_review: true
        confidence: 0.0
        reason: "Image purpose unclear"
        terminal: true
